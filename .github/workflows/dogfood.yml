# Dogfood — exercises `.github/actions/run` against this repo's first
# Verification Definition on every push. Spec: onsager-ai/duhem#36.
#
# Two jobs serve as the worked example for the action surface
# documented in `.github/actions/run/README.md`:
#
# - `wiring`: parses, validates, and dry-runs the VD through the
#   action. Catches contract drift between the action and the CLI
#   (input parsing, flag forwarding, output capture) without needing
#   a live Onsager environment in the runner. Required on every PR.
# - `verdict`: the full holistic run — builds Onsager, brings it up,
#   runs the VD end-to-end. Gated on a real Onsager source being
#   available, which waits on the Onsager-side companion spec (the
#   tracking note lives in the spec issue's "Open questions"). Until
#   that lands, the job no-ops; once it lands, it flips on without a
#   workflow rewrite.

name: dogfood

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: dogfood-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always

jobs:
  wiring:
    # Two-step smoke test of the composite action itself. Step 1
    # drives `duhem run --dry-run` directly to confirm the VD parses
    # and inputs resolve cleanly (fast, no browser). Step 2 invokes
    # `./.github/actions/run` end-to-end against the same VD against
    # a non-existent localhost server; the verdict will be
    # non-`pass`, which is the point — we're asserting the action's
    # plumbing (path validation, inputs parsing, build, browser
    # install, json-summary capture, output extraction) round-trips
    # whatever the CLI produces, not that the run itself succeeds.
    # The full holistic-green run lives in `verdict` below.
    name: action wiring
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          rustup show active-toolchain
          cargo --version
          rustc --version

      # Direct CLI dry-run. Fastest possible signal that the VD +
      # input catalog parse cleanly, before paying for the full
      # action smoke test below.
      - name: Build duhem CLI
        run: cargo build --release -p duhem-cli

      - name: Dry-run create-project VD (direct CLI)
        run: |
          ./target/release/duhem run \
            verifications/onsager-dashboard-create-project/duhem.yml \
            --dry-run \
            --inputs login_url=http://localhost:3000/login \
            --inputs new_project_url=http://localhost:3000/projects/new \
            --inputs projects_url=http://localhost:3000/projects \
            --inputs test_email=fixture@example.test \
            --inputs test_password=placeholder \
            --inputs project_name=duhem-fixture-${{ github.run_id }}

      # Active smoke test of the composite action. No Onsager server
      # is listening on localhost:3000, so the very first
      # `ui/navigate` will fail; we expect `verdict` to surface as a
      # non-`pass` value but to be NON-EMPTY — that's the assertion
      # that the action's json-summary capture + output extraction
      # actually ran. `continue-on-error: true` keeps the workflow
      # green on the non-pass exit code, so the subsequent assertion
      # step gets to inspect outputs.
      - name: Smoke-test action against create-project VD
        id: action-smoke
        continue-on-error: true
        uses: ./.github/actions/run
        with:
          verification-path: verifications/onsager-dashboard-create-project/duhem.yml
          inputs: |
            login_url=http://localhost:3000/login
            new_project_url=http://localhost:3000/projects/new
            projects_url=http://localhost:3000/projects
            test_email=fixture@example.test
            test_password=placeholder
            project_name=duhem-fixture-${{ github.run_id }}

      - name: Assert action surfaced verdict outputs
        env:
          ACTION_VERDICT: ${{ steps.action-smoke.outputs.verdict }}
          ACTION_EVIDENCE_DIR: ${{ steps.action-smoke.outputs.evidence-dir }}
        run: |
          # Both outputs must be populated. An empty `verdict` here
          # means the CLI exited before the reporter ran (e.g.
          # browser launch crash, validation failure) — a real
          # regression in the action's setup steps. An empty
          # `evidence-dir` means the json summary was malformed.
          echo "verdict=$ACTION_VERDICT"
          echo "evidence-dir=$ACTION_EVIDENCE_DIR"
          if [ -z "$ACTION_VERDICT" ]; then
            echo "::error::composite action did not surface a verdict — its setup steps regressed"
            exit 1
          fi
          if [ -z "$ACTION_EVIDENCE_DIR" ]; then
            echo "::error::composite action did not surface an evidence-dir — json reporter contract regressed"
            exit 1
          fi
          # We DO NOT assert verdict == pass here: no Onsager server
          # is running, so the holistic run cannot succeed. The
          # green-verdict assertion lives in `verdict` below.

  verdict:
    # Holistic run against a live Onsager environment. Gated until the
    # Onsager-side companion spec lands an Onsager build entrypoint
    # this job can call (see `verifications/onsager-dashboard-create-project/README.md`
    # "Open items" and the spec issue's "Open questions").
    name: holistic run (gated)
    runs-on: ubuntu-latest
    if: ${{ vars.ONSAGER_DOGFOOD_READY == 'true' }}
    steps:
      - uses: actions/checkout@v4

      # Onsager build/serve steps land with the Onsager-side
      # companion spec — `onsager-ai/onsager` will expose a script
      # this job can invoke to bring the dashboard up on
      # http://localhost:3000 with a fixture user provisioned.
      - name: Bring up Onsager
        run: |
          echo "::error::Onsager build/serve hook not yet wired. Set repo variable ONSAGER_DOGFOOD_READY=false until the Onsager-side companion spec lands."
          exit 1

      - name: Verify create-project
        id: duhem
        uses: ./.github/actions/run
        with:
          verification-path: verifications/onsager-dashboard-create-project/duhem.yml
          inputs: |
            login_url=http://localhost:3000/login
            new_project_url=http://localhost:3000/projects/new
            projects_url=http://localhost:3000/projects
            test_email=${{ secrets.DUHEM_FIXTURE_EMAIL }}
            test_password=${{ secrets.DUHEM_FIXTURE_PASSWORD }}
            project_name=duhem-fixture-${{ github.run_id }}

      - name: Surface evidence on red
        if: failure() && steps.duhem.outputs.evidence-dir != ''
        uses: actions/upload-artifact@v4
        with:
          name: duhem-evidence
          path: ${{ steps.duhem.outputs.evidence-dir }}
