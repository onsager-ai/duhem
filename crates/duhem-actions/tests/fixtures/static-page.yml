# Worked example for spec(actions) ui/* v1 (issue #12).
#
# Drives a real browser (via the `playwright` crate) against the
# tiny axum-served fixture in `tests/ui_smoke.rs`. The two-step
# scenario is the smallest end-to-end exercise of the three v1
# actions: `ui/navigate` to load the page, `ui/click` to interact,
# `ui/assert-element` to observe a DOM state change.
#
# This file round-trips through #8's parser today; it executes
# end-to-end once the runtime spec
# (`spec(runtime): minimal step executor`) lands and wires the
# action trait into a check executor.

verification: Static page smoke

inputs:
  fixture_url:
    type: string

# Setup runs once before the criteria (#20). Pre-navigates and
# probes for the Create button so the check can reference setup
# outputs via `$setup.*`. Setup gets its own browser context — only
# named outputs cross into the per-check browser; state does not.
setup:
  - uses: ui/navigate
    with: { url: $inputs.fixture_url }
  - id: probe
    uses: ui/assert-element
    with:
      locator: { role: "button", name: "Create" }
      expected: visible
      within: 2s

criteria:
  - id: AC-1
    description: |
      The fixture page loads, the "Create" button exists, and clicking
      it makes the success banner appear.
    checks:
      - id: AC-1.1
        steps:
          - uses: ui/navigate
            with: { url: $inputs.fixture_url }
          - uses: ui/click
            with: { role: "button", name: "Create" }
          - id: banner
            uses: ui/assert-element
            with:
              locator: { role: "alert", text: "Created" }
              expected: visible
              within: 2s
        assertions:
          - $steps.banner.outputs.satisfied == true
          - $setup.probe.outputs.satisfied == true

  # Exercises the rest-of-slice actions from #37 — `ui/type`,
  # `ui/select`, `ui/assert-url`, `ui/assert-state` — on the same
  # fixture page. Same trait / lifecycle / Locator as AC-1.
  - id: AC-2
    description: |
      Fill the name input, pick a role from the select, submit, and
      observe the post-submit URL and load state.
    checks:
      - id: AC-2.1
        steps:
          - uses: ui/navigate
            with: { url: $inputs.fixture_url }
          - uses: ui/type
            with:
              locator: { role: "textbox", name: "Name" }
              text: "Alice"
          - uses: ui/select
            with:
              locator: { role: "combobox", name: "Role" }
              by: { label: "Admin" }
          - uses: ui/click
            with: { role: "button", name: "Submit" }
          - id: landed
            uses: ui/assert-url
            with: { matches: "/thanks", within: 2s }
          - id: loaded
            uses: ui/assert-state
            with: { state: loaded, within: 2s }
        assertions:
          - $steps.landed.outputs.satisfied == true
          - $steps.loaded.outputs.satisfied == true
