# {{NAME}} — Duhem init skeleton (Pattern B)
#
# Generated by `duhem init --pattern B`. Edit this file to verify
# your real workload. The skeleton below runs end-to-end against
# https://example.com (a stable public page) so you have a known-
# good baseline to mutate.
#
# Pattern B (per `docs/duhem-spec.md` §10.4) co-locates per-
# feature Verification Definitions under a directory referenced
# by a sibling root manifest (`../duhem.yml`). Criteria prose
# lives next door in `criteria.md`.

verification: {{NAME}} — Duhem init skeleton

inputs:
  base_url:
    type: string
    default: https://example.com

criteria:
  - id: AC-1
    description: |
      The example.com landing page renders its canonical heading.
      Replace this criterion with your own intent statement
      before flipping the spec issue to `planned`.
    checks:
      - id: AC-1.1
        description: |
          Load the landing page and confirm the canonical heading
          is visible.
        steps:
          - uses: ui/navigate
            with:
              url: $inputs.base_url
          - id: heading
            uses: ui/assert-element
            with:
              locator: { role: heading, name: "Example Domain" }
              expected: visible
              within: 5s
            outputs:
              satisfied: satisfied
        assertions:
          - $steps.heading.outputs.satisfied == true
