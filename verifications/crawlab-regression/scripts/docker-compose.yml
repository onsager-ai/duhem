# Crawlab Pro regression cluster — the blueprint the suite provisions once.
#
# Modeled on crawlab-team/crawlab-test's `docker-compose.test.yml`, trimmed
# to the three services the regression suite needs (mongo + master + worker)
# and re-mapped to non-colliding host ports. The DB-integration services in
# crawlab-test (mysql/postgres/mssql/elasticsearch) are intentionally
# dropped — they belong to crawlab-test's INT specs, not the auth/token
# slice, and can be added back when a regression leaf needs them.
#
# Image: crawlabteam/crawlab-pro:develop (the REAL Pro product, as shipped).
# The Pro `develop` image verifies an HS256 JWT license against the
# hardcoded dev key `test-secret`; `scripts/up.sh` mints a fresh dev/test
# license at provision time and injects it as CRAWLAB_LICENSE (never
# hardcoded). See scripts/mint-license.sh.
#
# Host-port map (off the dev machine's Traefik on 8080/8000):
#   master REST/UI  127.0.0.1:8090 -> container 8080 (nginx; /api proxied)
#   master gRPC     127.0.0.1:9666 -> container 9666
#   mongo           127.0.0.1:27018 -> container 27017 (admin/admin)
#
# NOTE on the worker's CRAWLAB_API_ENDPOINT: it points at the *internal*
# container endpoint `http://master:8080`, NOT the host port 8090 — the
# worker sits on the compose network and reaches the master by service
# name on its container port. (The host-process recipe in
# crawlab-spider-task-lifecycle uses :8090 because there everything runs on
# the host.) Setting it is what keeps spider-file sync from 404-ing once a
# task-lifecycle leaf is added; the auth/token slice does not exercise the
# worker, but P0 provisions the full cluster so the rest of the suite has it.

networks:
  crawlab_regression:
    driver: bridge

services:
  mongo:
    image: mongo:5
    networks:
      - crawlab_regression
    environment:
      MONGO_INITDB_DATABASE: crawlab
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin
    ports:
      - "127.0.0.1:27018:27017"
    healthcheck:
      test: ["CMD", "mongosh", "-u", "admin", "-p", "admin", "--authenticationDatabase", "admin", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - mongo_data:/data/db

  master:
    image: "${CRAWLAB_IMAGE:-crawlabteam/crawlab-pro:develop}"
    networks:
      - crawlab_regression
    environment:
      CRAWLAB_NODE_NAME: "Master Node"
      CRAWLAB_NODE_MASTER: "Y"
      CRAWLAB_MONGO_HOST: "mongo"
      CRAWLAB_MONGO_PORT: "27017"
      CRAWLAB_MONGO_DB: "crawlab"
      CRAWLAB_MONGO_USERNAME: "admin"
      CRAWLAB_MONGO_PASSWORD: "admin"
      CRAWLAB_MONGO_AUTH_SOURCE: "admin"
      CRAWLAB_LICENSE: "${CRAWLAB_LICENSE:-}"
      CRAWLAB_LOG_LEVEL: "info"
      CRAWLAB_SERVER_HOST: "0.0.0.0"
      CRAWLAB_SERVER_PORT: "8000"
      CRAWLAB_GRPC_SERVER_HOST: "0.0.0.0"
      CRAWLAB_GRPC_SERVER_PORT: "9666"
      CRAWLAB_AUTH_KEY: "Crawlab2024!"
    ports:
      - "127.0.0.1:8090:8080"
      - "127.0.0.1:9666:9666"
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    restart: unless-stopped

  worker:
    image: "${CRAWLAB_IMAGE:-crawlabteam/crawlab-pro:develop}"
    networks:
      - crawlab_regression
    environment:
      CRAWLAB_NODE_NAME: "Worker Node 01"
      CRAWLAB_NODE_MASTER: "N"
      CRAWLAB_MASTER_HOST: "master"
      CRAWLAB_MASTER_PORT: "9666"
      CRAWLAB_GRPC_SERVER_HOST: "master"
      CRAWLAB_GRPC_SERVER_PORT: "9666"
      # Internal container endpoint (service name + container port), NOT host
      # 8090 — the worker is on the compose network. Keeps spider-file sync
      # from 404-ing for future task-lifecycle leaves.
      CRAWLAB_API_ENDPOINT: "http://master:8080"
      CRAWLAB_MONGO_HOST: "mongo"
      CRAWLAB_MONGO_PORT: "27017"
      CRAWLAB_MONGO_DB: "crawlab"
      CRAWLAB_MONGO_USERNAME: "admin"
      CRAWLAB_MONGO_PASSWORD: "admin"
      CRAWLAB_MONGO_AUTH_SOURCE: "admin"
      CRAWLAB_LICENSE: "${CRAWLAB_LICENSE:-}"
      CRAWLAB_LOG_LEVEL: "info"
      CRAWLAB_AUTH_KEY: "Crawlab2024!"
    depends_on:
      master:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mongo_data:
