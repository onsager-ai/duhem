# Crawlab — sign in and reach the dashboard (dogfood)
#
# Duhem's UI dogfood against Crawlab Pro's Vue dashboard — companion to
# the REST VD (`../crawlab-create-project/`). Criteria prose:
# `./criteria.md`. Operator setup: `./README.md`.
#
# This drives the real Vue SPA (served by Vite) against the real Crawlab
# REST backend over a real MongoDB. Holistic posture
# (`docs/duhem-spec.md` §8): the dashboard's login form really POSTs to
# the backend `/login`, stores the returned token, and the auth-gated
# routes really call the backend. No mocks at the web boundary.
#
# The app uses HASH routing (`…/#/login`, `…/#/home`, `…/#/projects`).
# Locators below were confirmed against the live UI: the login form's
# `Username` / `Password` textboxes and `Sign In` button, and the
# `New Project` button on the projects page.
#
# Per-check browser isolation (cookies + localStorage don't cross
# checks), so AC-2 repeats the sign-in prelude before navigating on —
# the same pattern as the Onsager dogfood.
#
# Default frontend port 5188 (Crawlab's Vite default 5173 collides with
# Onsager on the dev machine); backend 8090.

verification: Crawlab — sign in and reach the dashboard

environment:
  up: ./scripts/up.sh
  down: ./scripts/down.sh
  ready:
    http:
      url: $inputs.health_url
      timeout: 180s

inputs:
  # The backend health URL gates readiness; the dashboard URLs drive the
  # checks. `up.sh` ensures the Vite frontend is up before it exits.
  health_url:
    type: string
    default: http://127.0.0.1:8090/health
  login_url:
    type: string
    default: http://127.0.0.1:5188/#/login
  projects_url:
    type: string
    default: http://127.0.0.1:5188/#/projects
  username:
    type: string
    default: admin
  password:
    type: string
    default: admin

criteria:
  - id: AC-1
    description: |
      Signing in with valid credentials from the dashboard authenticates
      the user and takes them into the app — the sign-in form is left
      behind and the authenticated home view is shown. No errors shown.
    checks:
      - id: AC-1.1
        description: |
          Load the dashboard sign-in page, enter valid credentials, and
          submit. Confirm the sign-in button leaves the DOM (the form is
          gone) and the route settles on the authenticated home view —
          one slice spanning the UI form, the real backend `/login`, and
          client-side auth routing.
        steps:
          - uses: ui/navigate
            with:
              url: $inputs.login_url
          - uses: ui/type
            with:
              locator: { role: textbox, name: Username }
              text: $inputs.username
          - uses: ui/type
            with:
              locator: { role: textbox, name: Password }
              text: $inputs.password
          - uses: ui/click
            with: { role: button, name: Sign In }
          - id: left_login
            uses: ui/assert-element
            with:
              # The sign-in button leaving the DOM is the signal the
              # session took effect and the app shell replaced the form.
              locator: { role: button, name: Sign In }
              expected: not_exists
              within: 15s
            outputs:
              satisfied: satisfied
          - id: on_home
            uses: ui/assert-url
            with:
              # Hash route settles on the home view after auth.
              matches: "#/home"
              within: 15s
            outputs:
              satisfied: satisfied
        assertions:
          - $steps.left_login.outputs.satisfied == true
          - $steps.on_home.outputs.satisfied == true

  - id: AC-2
    description: |
      Once signed in, the project-management page renders the
      authenticated projects surface — the list view with its create
      affordance — served from the real backend.
    checks:
      - id: AC-2.1
        description: |
          Sign in, navigate to the projects route, and confirm the
          authenticated projects page rendered — its `New Project`
          create affordance is present and the route is the projects
          list. Exercises an auth-gated view backed by a real list call.
        steps:
          - uses: ui/navigate
            with:
              url: $inputs.login_url
          - uses: ui/type
            with:
              locator: { role: textbox, name: Username }
              text: $inputs.username
          - uses: ui/type
            with:
              locator: { role: textbox, name: Password }
              text: $inputs.password
          - uses: ui/click
            with: { role: button, name: Sign In }
          - uses: ui/assert-element
            with:
              locator: { role: button, name: Sign In }
              expected: not_exists
              within: 15s
          - uses: ui/navigate
            with:
              url: $inputs.projects_url
          - id: projects_page
            uses: ui/assert-element
            with:
              locator: { role: button, name: New Project }
              expected: visible
              within: 15s
            outputs:
              satisfied: satisfied
          - id: on_projects
            uses: ui/assert-url
            with:
              matches: "#/projects"
              within: 10s
            outputs:
              satisfied: satisfied
        assertions:
          - $steps.projects_page.outputs.satisfied == true
          - $steps.on_projects.outputs.satisfied == true
