# yaml-language-server: $schema=../../../schema/duhem.schema.json
# Crawlab regression suite leaf — role management (API-018)
#
# A faithful Duhem port of crawlab-team/crawlab-test's
# `specs/api/API-018-role-management.md`. A suite leaf (no own
# `environment:`): it runs against the shared LICENSED Pro cluster the
# parent manifest (`../duhem.yml`) provisions. Standalone, run with
# `--no-env-up` and pass the inherited inputs via `--inputs`.
#
# Surface: POST /api/roles, GET /api/roles, GET /api/roles/{id},
# PUT /api/roles/{id}, DELETE /api/roles/{id}. API-018 documents only
# read/update/delete over the seeded default roles, but crawlab-pro's
# generic controller also exposes POST /api/roles (create) — AC-2 uses it
# to mint a throwaway NON-ADMIN role, because the root Admin role is
# protected from modification (PUT → 403; crawlab #180) and so cannot carry
# the durable-update assertion. Confirms the `roles` collection directly in
# Mongo.
#
# Provenance — confirmed vs inferred:
#   - Endpoint paths + `/api` prefix + admin/admin + login envelope:
#     CONFIRMED (see ../auth-tokens/duhem.yml provenance). API-018's own
#     paths omit `/api` (it documents `/roles`) but the Pro `develop` image
#     serves everything under `/api`; CONFIRMED against the suite's other
#     leaves.
#   - Single-resource read returns `{data:<role>}`: CONFIRMED envelope.
#   - Role documents carry a `routes` array and a `root_admin` bool
#     (crawlab #180 — the model exposes `routes`/`root_admin`, NOT the
#     `pages`/`permissions` that API-018's prose implied). AC-1 asserts the
#     fields the model actually returns.
#   - PUT update body wraps under `data` ({data:{name,description}}):
#     INFERRED from the generic update envelope. The root Admin role rejects
#     PUT with 403 (AC-2.2); a non-admin role accepts it (AC-2.1).
#   - Default/system roles are PROTECTED from deletion (AC-3): per API-018
#     step 11 / error case (400/403). Asserted as 4xx; if crawlab allows
#     deleting a root role, this fails and surfaces reality. FLAG inferred.

verification: Crawlab — role management (API-018)
spec_ref: crawlab-team/crawlab-test specs/api/API-018-role-management.md

# OWN inputs: the roles endpoint + the description this leaf writes onto an
# existing role. Shared login URL + admin credentials + Mongo URL are
# inherited from the parent manifest (spec #135). The endpoint URL mirrors
# that manifest's host:port.
inputs:
  roles_url:
    type: string
    default: http://127.0.0.1:8090/api/roles
  # The non-admin role this leaf creates + edits (AC-2.1). The root Admin
  # role is protected (403 on PUT), so durable-update assertions must run
  # against a test-created role, not a seeded system role (crawlab #180).
  role_name:
    type: string
    default: duhem-regr-role
  updated_role_description:
    type: string
    default: duhem-regr-role-description

inherits:
  - login_url
  - mongo_url
  - password
  - username

criteria:
  - id: AC-1
    description: |
      The system ships with real roles, backed by the database: the role
      list is non-empty, a role is fetchable by id with its model shape (a
      `routes` array and a `root_admin` flag), and the database confirms a
      root-admin role exists in the `roles` collection. Roles are genuine
      records, not a synthetic API response.
    checks:
      - id: AC-1.1
        description: |
          Log in, list roles (expecting the default roles), fetch the first
          role by id and confirm its model fields (`routes`, `root_admin`)
          are present, then read the `roles` collection in Mongo to confirm
          a root-admin role exists.
        steps:
          - id: login
            uses: api/call
            with:
              method: POST
              url: $inputs.login_url
              headers: { Content-Type: application/json }
              body:
                username: $inputs.username
                password: $inputs.password
              within: 15s
            outputs:
              body: body
          - id: list
            uses: api/call
            with:
              method: GET
              url: $inputs.roles_url
              headers:
                Authorization: $steps.login.outputs.body.data
              within: 15s
            outputs:
              status: status
              body: body
          - id: get_one
            uses: api/call
            with:
              method: GET
              url: '$runtime.format("{}/{}", $inputs.roles_url, $steps.list.outputs.body.data[0]._id)'
              headers:
                Authorization: $steps.login.outputs.body.data
              within: 15s
            outputs:
              status: status
              body: body
          - id: root_db
            uses: db/query
            with:
              connection: $inputs.mongo_url
              find:
                collection: roles
                filter:
                  root_admin: true
                sort:
                  _id: -1
                limit: 1
              within: 15s
            outputs:
              rows: rows
              row_count: row_count
        assertions:
          - $steps.list.outputs.status == 200
          - $runtime.len($steps.list.outputs.body.data) >= 1
          - $steps.get_one.outputs.status == 200
          # The role model exposes `routes` + `root_admin` (crawlab #180),
          # NOT `pages`/`permissions` — assert the fields the model returns.
          - $runtime.exists($steps.get_one.outputs.body.data.routes)
          - $runtime.exists($steps.get_one.outputs.body.data.root_admin)
          # A root-admin role exists in the roles collection.
          - $steps.root_db.outputs.row_count >= 1
          - $steps.root_db.outputs.rows[0].root_admin == true

  - id: AC-2
    description: |
      A non-admin role update is durable AND the protected root-admin role
      is guarded: creating a fresh non-admin role and PUTting a new
      description onto it lands in the database (200), while an attempt to
      modify the root Admin role is refused (403). Role edits are persisted,
      not merely acknowledged by the handler — and the root role is not
      freely mutable.
    checks:
      - id: AC-2.1
        description: |
          Log in, create a fresh non-admin role, PUT a new description onto
          it, then read the `roles` collection back and confirm the new
          description persisted for that role (a non-admin role is editable,
          so the update returns 200).
        steps:
          - id: login
            uses: api/call
            with:
              method: POST
              url: $inputs.login_url
              headers: { Content-Type: application/json }
              body:
                username: $inputs.username
                password: $inputs.password
              within: 15s
            outputs:
              body: body
          - id: create
            uses: api/call
            with:
              method: POST
              url: $inputs.roles_url
              headers:
                Content-Type: application/json
                Authorization: $steps.login.outputs.body.data
              body:
                data:
                  name: $inputs.role_name
                  description: duhem-regr-role-seed
              within: 15s
            outputs:
              status: status
              body: body
          - id: update
            uses: api/call
            with:
              method: PUT
              url: '$runtime.format("{}/{}", $inputs.roles_url, $steps.create.outputs.body.data._id)'
              headers:
                Content-Type: application/json
                Authorization: $steps.login.outputs.body.data
              body:
                data:
                  name: $inputs.role_name
                  description: $inputs.updated_role_description
              within: 15s
            outputs:
              status: status
          - id: persisted
            uses: db/query
            with:
              connection: $inputs.mongo_url
              find:
                collection: roles
                filter:
                  name: $inputs.role_name
                sort:
                  _id: -1
                limit: 1
              within: 15s
            outputs:
              rows: rows
        assertions:
          - $steps.create.outputs.status == 200
          - $runtime.exists($steps.create.outputs.body.data._id)
          - $steps.update.outputs.status == 200
          - $steps.persisted.outputs.rows[0].description == $inputs.updated_role_description
      - id: AC-2.2
        description: |
          Log in, locate the root-admin role in Mongo, then PUT a new
          description onto it and confirm the update is refused with 403 —
          crawlab protects the root Admin role from modification.
        steps:
          - id: login
            uses: api/call
            with:
              method: POST
              url: $inputs.login_url
              headers: { Content-Type: application/json }
              body:
                username: $inputs.username
                password: $inputs.password
              within: 15s
            outputs:
              body: body
          - id: admin_db
            uses: db/query
            with:
              connection: $inputs.mongo_url
              find:
                collection: roles
                filter:
                  root_admin: true
                sort:
                  _id: -1
                limit: 1
              within: 15s
            outputs:
              rows: rows
          - id: update_admin
            uses: api/call
            with:
              method: PUT
              url: '$runtime.format("{}/{}", $inputs.roles_url, $steps.admin_db.outputs.rows[0]._id)'
              headers:
                Content-Type: application/json
                Authorization: $steps.login.outputs.body.data
              body:
                data:
                  name: $steps.admin_db.outputs.rows[0].name
                  description: $inputs.updated_role_description
              within: 15s
            outputs:
              status: status
        assertions:
          - $steps.update_admin.outputs.status == 403

  - id: AC-3
    description: |
      Invalid and protected role operations are refused: fetching or
      updating a non-existent role is a 404, and deleting a protected
      system (root-admin) role is rejected with a client error. The system's
      access-control records are guarded, not freely mutable.
    checks:
      - id: AC-3.1
        description: |
          Fetch a role by a well-formed but non-existent id and confirm the
          response is 404 Not Found.
        steps:
          - id: login
            uses: api/call
            with:
              method: POST
              url: $inputs.login_url
              headers: { Content-Type: application/json }
              body:
                username: $inputs.username
                password: $inputs.password
              within: 15s
            outputs:
              body: body
          - id: get_missing
            uses: api/call
            with:
              method: GET
              url: '$runtime.format("{}/{}", $inputs.roles_url, "000000000000000000000000")'
              headers:
                Authorization: $steps.login.outputs.body.data
              within: 15s
            outputs:
              status: status
        assertions:
          - $steps.get_missing.outputs.status == 404
      - id: AC-3.2
        description: |
          Update a role by a well-formed but non-existent id and confirm the
          response is 404 Not Found.
        steps:
          - id: login
            uses: api/call
            with:
              method: POST
              url: $inputs.login_url
              headers: { Content-Type: application/json }
              body:
                username: $inputs.username
                password: $inputs.password
              within: 15s
            outputs:
              body: body
          - id: update_missing
            uses: api/call
            with:
              method: PUT
              url: '$runtime.format("{}/{}", $inputs.roles_url, "000000000000000000000000")'
              headers:
                Content-Type: application/json
                Authorization: $steps.login.outputs.body.data
              body:
                data:
                  name: duhem-regr-nonexistent-role
                  description: $inputs.updated_role_description
              within: 15s
            outputs:
              status: status
        assertions:
          - $steps.update_missing.outputs.status == 404
      - id: AC-3.3
        description: |
          Attempt to delete the protected root-admin role and confirm it is
          refused with a 4xx — system roles are protected from deletion.
        steps:
          - id: login
            uses: api/call
            with:
              method: POST
              url: $inputs.login_url
              headers: { Content-Type: application/json }
              body:
                username: $inputs.username
                password: $inputs.password
              within: 15s
            outputs:
              body: body
          - id: root_db
            uses: db/query
            with:
              connection: $inputs.mongo_url
              find:
                collection: roles
                filter:
                  root_admin: true
                sort:
                  _id: -1
                limit: 1
              within: 15s
            outputs:
              rows: rows
          - id: delete_root
            uses: api/call
            with:
              method: DELETE
              url: '$runtime.format("{}/{}", $inputs.roles_url, $steps.root_db.outputs.rows[0]._id)'
              headers:
                Authorization: $steps.login.outputs.body.data
              within: 15s
            outputs:
              status: status
        assertions:
          - $steps.delete_root.outputs.status >= 400
          - $steps.delete_root.outputs.status < 500
