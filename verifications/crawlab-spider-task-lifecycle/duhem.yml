# Crawlab — schedule a spider task and read the lifecycle from Mongo (dogfood)
#
# Duhem's deep Crawlab Verification Definition: it drives the spider →
# task scheduling path over REST, then reads Crawlab's real MongoDB
# directly with `db/query` (#121) to assert the lifecycle state the
# scheduler actually persisted. Criteria prose: `./criteria.md`.
# Operator setup: `./README.md`.
#
# Why this VD exists: the create-project VD verifies REST + a Mongo
# write for a flat resource. Crawlab's distinctive value is the
# distributed *task lifecycle* — a spider run is scheduled into a task
# document that a worker later claims and executes. This VD verifies the
# scheduling half of that lifecycle at the database layer: creating a
# spider persists a real `spiders` document, and running it persists a
# real `tasks` document linked to that spider in the initial `pending`
# state. That linkage (task.spider_id == spider._id, across two
# collections) is exactly what a REST echo can't prove and what
# `db/query` reading Mongo can.
#
# Holistic posture (`docs/duhem-spec.md` §8): every step drives the real
# Crawlab REST API and the real MongoDB behind it. No mocks at the web
# boundary; the assertions read persisted Mongo state, not handler
# return values.
#
# Scope boundary (honest, per §8/§11.2): this verifies task SCHEDULING
# (pending), not task EXECUTION (pending → running → finished). Execution
# needs Crawlab's gRPC worker coordination, whose server is started in
# the Pro layer (crawlab-pro/core/apps/grpc.go) — the license-free
# OSS-core recipe this VD provisions never starts it, so a task stays
# `pending` (confirmed live: node_id 000…000, no claimant). A deeper
# execution VD waits on a licensed / worker-bearing stack. See README.
#
# Shape provenance (all from crawlab-pro source, not guessed):
#   - POST /login -> {data:<token>}; Authorization: <token> (bare):
#     core/controllers/login.go, core/utils/token.go
#   - spider {_id,name,cmd,...}; Mongo collection `spiders` (tag
#     collection:"spiders"); exec field `cmd`; `mode` enum
#     random,all,selected-nodes: core/models/models/spider.go
#   - generic create wraps the model under `data`
#     (controllers/base.go PostParams{Data T `json:"data"`})
#   - POST /spiders/:id/run {mode,cmd} -> data:[<taskId>,...]:
#     core/controllers/spider.go PostSpiderRun, router.go
#   - task {_id,spider_id,status,cmd,node_id,mode}; Mongo collection
#     `tasks` (tag collection:"tasks"); status enum incl.
#     pending,running,finished,error: core/models/models/task.go,
#     core/constants/task.go; random mode enqueues with nil node_id
#     for a worker to claim: core/spider/admin/service.go
#   - default admin/admin on first boot: core/user/service.go
#   - GET /health -> 200: core/controllers/health.go
#
# Ports: backend 8090 (off Crawlab's own 8080, held by the dev-proxy);
# throwaway Mongo on host 27018, db `crawlab`. Same provisioning as the
# create-project VD (`scripts/up.sh` runs the OSS core + a Mongo
# container).

verification: Crawlab — schedule a spider task and read the lifecycle from Mongo

environment:
  up: ./scripts/up.sh
  down: ./scripts/down.sh
  ready:
    http:
      url: $inputs.health_url
      timeout: 180s

inputs:
  # Absolute URLs, passed whole (string interpolation isn't shipped).
  health_url:
    type: string
    default: http://127.0.0.1:8090/health
  login_url:
    type: string
    default: http://127.0.0.1:8090/login
  # Base collection URL; the run endpoint is `<spiders_url>/<id>/run`,
  # composed with $runtime.format from the created spider's id.
  spiders_url:
    type: string
    default: http://127.0.0.1:8090/spiders
  # The throwaway Mongo `up.sh` publishes (host 27018, db `crawlab`).
  # `db/query` routes mongodb:// URLs to its `find:` path; the spider
  # lands in `spiders`, the scheduled task in `tasks`.
  mongo_url:
    type: string
    default: mongodb://127.0.0.1:27018/crawlab
  username:
    type: string
    default: admin
  password:
    type: string
    default: admin
  spider_name:
    type: string
    default: duhem-lifecycle-spider
  # A distinctive command: it round-trips onto the spider and the task,
  # so `db/query` can filter the `tasks` collection by it (a string
  # field — no ObjectId-typed filter needed).
  spider_cmd:
    type: string
    default: echo duhem-lifecycle-probe

criteria:
  - id: AC-1
    description: |
      Creating a spider persists it to the database: the spider exists as
      a real document in Crawlab's Mongo `spiders` collection with the
      supplied name and command — not merely echoed by the API.
    checks:
      - id: AC-1.1
        description: |
          Log in, POST a new spider, then read the `spiders` collection in
          Crawlab's real MongoDB with `db/query` and confirm the document
          is there — same `_id` the API returned, same name and command.
          The deep DB-state slice: it asserts what landed in the store,
          read straight from Mongo.
        steps:
          - id: login
            uses: api/call
            with:
              method: POST
              url: $inputs.login_url
              headers: { Content-Type: application/json }
              body:
                username: $inputs.username
                password: $inputs.password
              within: 15s
            outputs:
              body: body
          - id: create
            uses: api/call
            with:
              method: POST
              url: $inputs.spiders_url
              headers:
                Content-Type: application/json
                Authorization: $steps.login.outputs.body.data
              body:
                data:
                  name: $inputs.spider_name
                  cmd: $inputs.spider_cmd
                  mode: random
              within: 15s
            outputs:
              status: status
              body: body
          - id: persisted
            uses: db/query
            with:
              connection: $inputs.mongo_url
              find:
                collection: spiders
                filter:
                  name: $inputs.spider_name
                sort:
                  _id: -1
                limit: 1
              within: 15s
            outputs:
              rows: rows
              row_count: row_count
        assertions:
          - $steps.create.outputs.status == 200
          # The spider is really in Mongo, read straight from the store.
          - $steps.persisted.outputs.row_count >= 1
          - $steps.persisted.outputs.rows[0].name == $inputs.spider_name
          - $steps.persisted.outputs.rows[0].cmd == $inputs.spider_cmd
          # And it's the very spider the API created.
          - $steps.persisted.outputs.rows[0]._id == $steps.create.outputs.body.data._id

  - id: AC-2
    description: |
      Running a spider schedules a task: the run request persists a real
      task document in Mongo's `tasks` collection, in the initial
      `pending` state, carrying the spider's command — the entry point of
      the distributed task lifecycle, verified at the database layer.
    checks:
      - id: AC-2.1
        description: |
          Log in, create a spider, then POST to `/spiders/<id>/run` and
          read the `tasks` collection in Mongo directly. Confirm a task
          was persisted in `pending` with the spider's command and the id
          the run returned. This proves the scheduler wrote a real task,
          not that a handler echoed one back.
        steps:
          - id: login
            uses: api/call
            with:
              method: POST
              url: $inputs.login_url
              headers: { Content-Type: application/json }
              body:
                username: $inputs.username
                password: $inputs.password
              within: 15s
            outputs:
              body: body
          - id: create
            uses: api/call
            with:
              method: POST
              url: $inputs.spiders_url
              headers:
                Content-Type: application/json
                Authorization: $steps.login.outputs.body.data
              body:
                data:
                  name: $inputs.spider_name
                  cmd: $inputs.spider_cmd
                  mode: random
              within: 15s
            outputs:
              body: body
          - id: run
            uses: api/call
            with:
              method: POST
              # Dynamic URL `<spiders_url>/<id>/run`, composed with the
              # pure $runtime.format helper from the created spider's id.
              url: $runtime.format("{}/{}/run", $inputs.spiders_url, $steps.create.outputs.body.data._id)
              headers:
                Content-Type: application/json
                Authorization: $steps.login.outputs.body.data
              body:
                mode: random
                cmd: $inputs.spider_cmd
              within: 15s
            outputs:
              status: status
              body: body
          - id: scheduled
            uses: db/query
            with:
              connection: $inputs.mongo_url
              find:
                collection: tasks
                # Filter by the command string (no ObjectId-typed filter
                # needed); newest first picks the task we just scheduled.
                filter:
                  cmd: $inputs.spider_cmd
                sort:
                  _id: -1
                limit: 1
              within: 15s
            outputs:
              rows: rows
              row_count: row_count
        assertions:
          - $steps.run.outputs.status == 200
          # A real task document was persisted by the run.
          - $steps.scheduled.outputs.row_count >= 1
          # In the initial lifecycle state, carrying the spider's command.
          - $steps.scheduled.outputs.rows[0].status == "pending"
          - $steps.scheduled.outputs.rows[0].cmd == $inputs.spider_cmd
          # It is the task the run endpoint reported.
          - $steps.scheduled.outputs.rows[0]._id == $steps.run.outputs.body.data[0]

  - id: AC-3
    description: |
      The scheduled task references exactly the spider that was created —
      the spider → task link is real in the database, not just implied by
      the API call sequence. One holistic slice spanning a REST create, a
      REST run, and two direct Mongo reads across two collections.
    checks:
      - id: AC-3.1
        description: |
          Create a spider, run it, then read the persisted task from Mongo
          and confirm its `spider_id` is exactly the created spider's
          `_id`. The ObjectID is read from the store and surfaces as a
          24-hex string (db/query's BSON→JSON mapping), directly
          comparable to the id the create returned — referential
          integrity verified at the database layer.
        steps:
          - id: login
            uses: api/call
            with:
              method: POST
              url: $inputs.login_url
              headers: { Content-Type: application/json }
              body:
                username: $inputs.username
                password: $inputs.password
              within: 15s
            outputs:
              body: body
          - id: create
            uses: api/call
            with:
              method: POST
              url: $inputs.spiders_url
              headers:
                Content-Type: application/json
                Authorization: $steps.login.outputs.body.data
              body:
                data:
                  name: $inputs.spider_name
                  cmd: $inputs.spider_cmd
                  mode: random
              within: 15s
            outputs:
              body: body
          - id: run
            uses: api/call
            with:
              method: POST
              url: $runtime.format("{}/{}/run", $inputs.spiders_url, $steps.create.outputs.body.data._id)
              headers:
                Content-Type: application/json
                Authorization: $steps.login.outputs.body.data
              body:
                mode: random
                cmd: $inputs.spider_cmd
              within: 15s
            outputs:
              body: body
          - id: scheduled
            uses: db/query
            with:
              connection: $inputs.mongo_url
              find:
                collection: tasks
                filter:
                  cmd: $inputs.spider_cmd
                sort:
                  _id: -1
                limit: 1
              within: 15s
            outputs:
              rows: rows
        assertions:
          # The task in Mongo links to exactly the spider we created.
          - $steps.scheduled.outputs.rows[0].spider_id == $steps.create.outputs.body.data._id
