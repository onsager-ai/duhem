# Crawlab regression — verification suite (shared-environment manifest)
#
# A root manifest (spec #131) that runs the Crawlab regression
# Verification Definitions against ONE shared LICENSED Pro cluster:
# `environment:` here provisions a crawlab-pro master + worker + MongoDB
# once, every leaf runs against it, and it's torn down once. This is the
# "1→N" infrastructure: adding a leaf costs an entry below, not another
# cluster bring-up.
#
# This is the foundation of the Crawlab 0.2 regression suite (Duhem
# issues #160 / #163) — a faithful Duhem port of crawlab-team/crawlab-test's
# spec corpus. It is the pattern-setting vertical slice: API-002
# (authentication & token management) ported to a regression leaf, on the
# REAL crawlab-pro product. It is AUTHORED + STRUCTURALLY VALIDATED here;
# the green run happens in the product env / Crawlab's CI where the
# develop image and a real cluster are available. It is NOT wired into
# Duhem's CI (no self-verify lane).
#
# Provisioning: `scripts/up.sh` brings up `scripts/docker-compose.yml`
# (image crawlabteam/crawlab-pro:develop) and mints a fresh HS256 dev/test
# license (dev key `test-secret`) injected as CRAWLAB_LICENSE — see
# scripts/mint-license.sh. The license is a maintainer-sanctioned DEV/TEST
# token, not a production license.
#
# Operator setup (see ./README.md for the full walkthrough):
#   docker + docker compose v2 on PATH; ports 8090 / 9666 / 27018 free.
# Run the whole suite:          duhem run verifications/crawlab-regression
# Iterate against a live stack:  ... --no-env-up --keep-env

manifest_version: 1

# Shared input VALUES, declared once (spec #135, rides on #68). These are
# the cluster's identity — its REST endpoints and seeded credentials. A
# single environment is declared, so it auto-selects; its keys bind the
# leaves' inherited inputs (`inherits:` in each leaf) through the
# resolution chain (--inputs [KEY=VALUE / @file] > selected environment).
# A leaf that needs `login_url` says only `inherits: [login_url]` instead
# of redeclaring it.
#
# The Pro `develop` image serves REST under `/api` (login is `/api/login`,
# health `/api/health`) — distinct from the OSS-core suite
# (../crawlab/), which serves bare `/login`. Mongo carries admin/admin
# root auth, so the connection URL names credentials + authSource.
environments:
  default:
    login_url: http://127.0.0.1:8090/api/login
    logout_url: http://127.0.0.1:8090/api/logout
    me_url: http://127.0.0.1:8090/api/users/me
    tokens_url: http://127.0.0.1:8090/api/tokens
    mongo_url: mongodb://admin:admin@127.0.0.1:27018/crawlab?authSource=admin
    username: admin
    password: admin

# Shared cluster: master REST on :8090 + worker + a throwaway Mongo on
# :27018, provisioned once before the first leaf and torn down after the
# last. The readiness probe gates the leaves on the Pro image's
# `/api/health` (a literal URL — the suite environment resolves it without
# per-leaf inputs).
environment:
  up: ./scripts/up.sh
  down: ./scripts/down.sh
  ready:
    http:
      url: http://127.0.0.1:8090/api/health
      timeout: 240s

verifications:
  - path: auth-tokens/duhem.yml
