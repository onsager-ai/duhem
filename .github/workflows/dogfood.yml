# Dogfood — exercises `.github/actions/run` as the worked example for
# the action surface. Spec: onsager-ai/duhem#36.
#
# The `wiring` job dry-runs a self-verification VD through the CLI
# (parse / validate / resolve), then asserts the action's trust-boundary
# path validation rejects absolute / escaping `verification-path`
# values — the regression harness for the asymmetric-trust seam
# (§11.2). No live product environment needed; required on every PR.
#
# The holistic onsager `verdict` run that used to live here moved out in
# epic #225 P4: product VDs are co-located with their products now
# (Chreode self-gates in `onsager-ai/chreode/.duhem/` and is
# drift-monitored via `drift-chreode.yml`; Onsager the same once it
# resumes). See `.github/actions/run/README.md`.

name: dogfood

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: dogfood-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  # Hub replication (#194 ship step in the action; hub per
  # onsager-ai/duhem-hub#6): with the secrets set, every dogfood run
  # ships its bundle; without them the step is a clean no-op.
  DUHEM_HUB_URL: ${{ secrets.DUHEM_HUB_URL }}
  DUHEM_HUB_TOKEN: ${{ secrets.DUHEM_HUB_TOKEN }}

jobs:
  wiring:
    # Smoke-tests the bits of the composite action that we can
    # reliably exercise without a live Onsager environment:
    #
    # - Step 1: direct CLI `--dry-run` confirms the VD parses and
    #   inputs resolve cleanly. Mirrors the action's own
    #   parse/validate/resolve pipeline.
    # - Step 2: action-invoked negative test for the trust-boundary
    #   path validation — pointing the action at an absolute or
    #   escaping `verification-path` must fail before `duhem run`
    #   is invoked. This is the regression harness for the action's
    #   first responsibility (asymmetric-trust seam, §11.2).
    #
    # An active smoke test of the action's HAPPY path (path-valid,
    # CLI runs, json summary captured, outputs populated) would
    # require a Chromium revision that pairs with the
    # `playwright = "0.0.20"` Rust crate's bundled driver
    # (`1.11.0-1620331022000`). `npx playwright install` floats to
    # the current Chromium revision, which the bundled driver
    # cannot drive — making any happy-path smoke test fail for
    # reasons unrelated to the action's logic. That coverage lives
    # in the gated `verdict` job below, which assumes a real
    # Onsager environment and therefore a real browser launch is in
    # scope. The longer-term fix is bumping the Rust `playwright`
    # crate dependency.
    name: action wiring
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Show toolchain
        run: |
          rustup show active-toolchain
          cargo --version
          rustc --version

      - name: Build duhem CLI
        run: cargo build --release -p duhem-cli

      - name: Dry-run a VD through the CLI (parse/resolve smoke)
        run: |
          # A self-verification VD (page-free, no required inputs) is
          # enough to smoke the action's parse/validate/resolve pipeline.
          # The onsager dogfood VD that used to sit here moved to
          # onsager-ai/onsager/.duhem/ (epic #225 P4).
          ./target/release/duhem run \
            verifications/duhem-cli/duhem.yml \
            --dry-run

      # Trust-boundary negative test #1: an absolute
      # verification-path must be rejected by the action before
      # `duhem run` is invoked. We assert the step's `outcome` is
      # `failure` — that's the contract a consumer's required check
      # depends on. A regression here would silently re-open the
      # path the asymmetric-trust seam exists to close.
      - name: Action rejects absolute verification-path
        id: reject-absolute
        continue-on-error: true
        uses: ./.github/actions/run
        with:
          verification-path: /etc/passwd

      - name: Assert absolute path was rejected
        run: |
          if [ "${{ steps.reject-absolute.outcome }}" != "failure" ]; then
            echo "::error::action accepted an absolute verification-path; trust-boundary regression"
            exit 1
          fi

      # Trust-boundary negative test #2: a path that normalizes
      # outside the Duhem checkout must be rejected. Catches a
      # regression in the `realpath -m` + prefix-match logic.
      - name: Action rejects path-traversal verification-path
        id: reject-traversal
        continue-on-error: true
        uses: ./.github/actions/run
        with:
          verification-path: ../../etc/passwd

      - name: Assert traversal path was rejected
        run: |
          if [ "${{ steps.reject-traversal.outcome }}" != "failure" ]; then
            echo "::error::action accepted a traversal verification-path; trust-boundary regression"
            exit 1
          fi

  # The holistic onsager `verdict` job that used to live here was
  # removed in epic #225 P4: the onsager `create-spec-plan` VD moved to
  # onsager-ai/onsager/.duhem/, where Onsager self-gates it (Mode A). A
  # `drift-onsager` lane (mirroring `drift-chreode.yml`, Mode B) can be
  # added when Onsager resumes. This workflow now stays focused on the
  # action-wiring worked example above.
