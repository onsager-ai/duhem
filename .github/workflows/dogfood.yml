# Dogfood — exercises `.github/actions/run` against this repo's first
# Verification Definition on every push. Spec: onsager-ai/duhem#36.
#
# Two jobs serve as the worked example for the action surface
# documented in `.github/actions/run/README.md`:
#
# - `wiring`: parses, validates, and dry-runs the VD through the
#   action. Catches contract drift between the action and the CLI
#   (input parsing, flag forwarding, output capture) without needing
#   a live Onsager environment in the runner. Required on every PR.
# - `verdict`: the full holistic run — builds Onsager, brings it up,
#   runs the VD end-to-end. Gated on a real Onsager source being
#   available, which waits on the Onsager-side companion spec (the
#   tracking note lives in the spec issue's "Open questions"). Until
#   that lands, the job no-ops; once it lands, it flips on without a
#   workflow rewrite.

name: dogfood

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: dogfood-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always

jobs:
  wiring:
    # Smoke-tests the bits of the composite action that we can
    # reliably exercise without a live Onsager environment:
    #
    # - Step 1: direct CLI `--dry-run` confirms the VD parses and
    #   inputs resolve cleanly. Mirrors the action's own
    #   parse/validate/resolve pipeline.
    # - Step 2: action-invoked negative test for the trust-boundary
    #   path validation — pointing the action at an absolute or
    #   escaping `verification-path` must fail before `duhem run`
    #   is invoked. This is the regression harness for the action's
    #   first responsibility (asymmetric-trust seam, §11.2).
    #
    # An active smoke test of the action's HAPPY path (path-valid,
    # CLI runs, json summary captured, outputs populated) would
    # require a Chromium revision that pairs with the
    # `playwright = "0.0.20"` Rust crate's bundled driver
    # (`1.11.0-1620331022000`). `npx playwright install` floats to
    # the current Chromium revision, which the bundled driver
    # cannot drive — making any happy-path smoke test fail for
    # reasons unrelated to the action's logic. That coverage lives
    # in the gated `verdict` job below, which assumes a real
    # Onsager environment and therefore a real browser launch is in
    # scope. The longer-term fix is bumping the Rust `playwright`
    # crate dependency.
    name: action wiring
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          rustup show active-toolchain
          cargo --version
          rustc --version

      - name: Build duhem CLI
        run: cargo build --release -p duhem-cli

      - name: Dry-run create-project VD (direct CLI)
        run: |
          ./target/release/duhem run \
            verifications/onsager-dashboard-create-project/duhem.yml \
            --dry-run \
            --inputs login_url=http://localhost:3000/login \
            --inputs new_project_url=http://localhost:3000/projects/new \
            --inputs projects_url=http://localhost:3000/projects \
            --inputs test_email=fixture@example.test \
            --inputs test_password=placeholder \
            --inputs project_name=duhem-fixture-${{ github.run_id }}

      # Trust-boundary negative test #1: an absolute
      # verification-path must be rejected by the action before
      # `duhem run` is invoked. We assert the step's `outcome` is
      # `failure` — that's the contract a consumer's required check
      # depends on. A regression here would silently re-open the
      # path the asymmetric-trust seam exists to close.
      - name: Action rejects absolute verification-path
        id: reject-absolute
        continue-on-error: true
        uses: ./.github/actions/run
        with:
          verification-path: /etc/passwd

      - name: Assert absolute path was rejected
        run: |
          if [ "${{ steps.reject-absolute.outcome }}" != "failure" ]; then
            echo "::error::action accepted an absolute verification-path; trust-boundary regression"
            exit 1
          fi

      # Trust-boundary negative test #2: a path that normalizes
      # outside the Duhem checkout must be rejected. Catches a
      # regression in the `realpath -m` + prefix-match logic.
      - name: Action rejects path-traversal verification-path
        id: reject-traversal
        continue-on-error: true
        uses: ./.github/actions/run
        with:
          verification-path: ../../etc/passwd

      - name: Assert traversal path was rejected
        run: |
          if [ "${{ steps.reject-traversal.outcome }}" != "failure" ]; then
            echo "::error::action accepted a traversal verification-path; trust-boundary regression"
            exit 1
          fi

  verdict:
    # Holistic run against a live Onsager environment. Gated until the
    # Onsager-side companion spec lands an Onsager build entrypoint
    # this job can call (see `verifications/onsager-dashboard-create-project/README.md`
    # "Open items" and the spec issue's "Open questions").
    name: holistic run (gated)
    runs-on: ubuntu-latest
    if: ${{ vars.ONSAGER_DOGFOOD_READY == 'true' }}
    steps:
      - uses: actions/checkout@v4

      # Onsager build/serve steps land with the Onsager-side
      # companion spec — `onsager-ai/onsager` will expose a script
      # this job can invoke to bring the dashboard up on
      # http://localhost:3000 with a fixture user provisioned.
      - name: Bring up Onsager
        run: |
          echo "::error::Onsager build/serve hook not yet wired. Set repo variable ONSAGER_DOGFOOD_READY=false until the Onsager-side companion spec lands."
          exit 1

      - name: Verify create-project
        id: duhem
        uses: ./.github/actions/run
        with:
          verification-path: verifications/onsager-dashboard-create-project/duhem.yml
          inputs: |
            login_url=http://localhost:3000/login
            new_project_url=http://localhost:3000/projects/new
            projects_url=http://localhost:3000/projects
            test_email=${{ secrets.DUHEM_FIXTURE_EMAIL }}
            test_password=${{ secrets.DUHEM_FIXTURE_PASSWORD }}
            project_name=duhem-fixture-${{ github.run_id }}

      - name: Surface evidence on red
        if: failure() && steps.duhem.outputs.evidence-dir != ''
        uses: actions/upload-artifact@v4
        with:
          name: duhem-evidence
          path: ${{ steps.duhem.outputs.evidence-dir }}
