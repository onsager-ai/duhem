<text x="283" y="19" text-anchor="middle" font-size="11" fill="#7d8590">duhem — catching a self-masking bug</text>
<text y="60" class="line" xml:space="preserve" style="animation:ln0 9500ms infinite"><tspan x="18.0" class="p">$ </tspan><tspan x="34.8" class="c">curl -s localhost:8477/health</tspan></text><text y="80" class="line" xml:space="preserve" style="animation:ln1 9500ms infinite"><tspan x="18.0" class="o">{&quot;status&quot;:&quot;healthy&quot;}</tspan><tspan x="186.0" class="d">    # the app says it's healthy</tspan></text><text y="120" class="line" xml:space="preserve" style="animation:ln3 9500ms infinite"><tspan x="18.0" class="p">$ </tspan><tspan x="34.8" class="c">duhem run</tspan></text><text y="140" class="line" xml:space="preserve" style="animation:ln4 9500ms infinite"><tspan x="18.0" class="f">fail</tspan></text><text y="160" class="line" xml:space="preserve" style="animation:ln5 9500ms infinite"><tspan x="18.0" class="o">  AC-2::AC-2.1:</tspan></text><text y="180" class="line" xml:space="preserve" style="animation:ln6 9500ms infinite"><tspan x="18.0" class="f">    fail  $steps.front.outputs.body.title == &quot;Acme Dashboard&quot;</tspan></text><text y="200" class="line" xml:space="preserve" style="animation:ln7 9500ms infinite"><tspan x="18.0" class="d">        (actual &quot;Welcome to nginx!&quot;, expected &quot;Acme Dashboard&quot;)</tspan></text><text y="240" class="line" xml:space="preserve" style="animation:ln9 9500ms infinite"><tspan x="18.0" class="m"># /health was green — Duhem drove the real front and caught it</tspan></text><text y="280" class="line" xml:space="preserve" style="animation:ln11 9500ms infinite"><tspan x="18.0" class="p">$ </tspan><tspan x="34.8" class="d"># ship the fix, re-run the same gate</tspan></text><text y="300" class="line" xml:space="preserve" style="animation:ln12 9500ms infinite"><tspan x="18.0" class="p">$ </tspan><tspan x="34.8" class="c">duhem run</tspan></text><text y="320" class="line" xml:space="preserve" style="animation:ln13 9500ms infinite"><tspan x="18.0" class="g">pass</tspan></text>
</svg>
