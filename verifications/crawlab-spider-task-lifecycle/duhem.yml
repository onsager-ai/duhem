# Crawlab — run a spider task to completion and read the lifecycle from Mongo (dogfood)
#
# Duhem's deepest Crawlab Verification Definition: it drives a spider all
# the way through the distributed task lifecycle — create, run, and
# **execute to a terminal state** — then reads Crawlab's real MongoDB
# directly with `db/query` (#121) to assert the lifecycle state that
# actually persisted. Criteria prose: `./criteria.md`. Operator setup:
# `./README.md`.
#
# Why this VD exists: the create-project VD verifies REST + a Mongo write
# for a flat resource. Crawlab's distinctive value is the distributed
# *task lifecycle* — a spider run is scheduled into a task that a worker
# claims over gRPC, syncs the spider's files, executes, and drives to
# `finished`. This VD exercises that whole web: master schedules, worker
# executes, and the verdict reads the persisted task state from Mongo
# (status reaching `finished`; `task.spider_id == spider._id` across two
# collections) — exactly what a REST echo can't prove.
#
# Pro cluster (per `docs/duhem-spec.md` §8, no mocks): execution needs
# Crawlab's gRPC worker coordination, whose server is started only in the
# Pro layer (crawlab-pro/core/apps/grpc.go). So `scripts/up.sh` runs the
# **Pro** binary as a master + one worker over a real MongoDB. (The
# license-free OSS core never starts the gRPC server, so a task there
# stays `pending` with no claimant — that's why the sibling create-project
# VD stops at scheduling and this one runs the Pro stack. See README.)
#
# Holistic posture: every step drives the real Crawlab REST API, the real
# gRPC master/worker path, and the real MongoDB behind them. The
# assertions read persisted Mongo state, not handler return values.
#
# Shape provenance (all from crawlab-pro source, not guessed):
#   - POST /login -> {data:<token>}; Authorization: <token> (bare):
#     core/controllers/login.go, core/utils/token.go
#   - spider {_id,name,cmd,...}; Mongo collection `spiders` (tag
#     collection:"spiders"); exec field `cmd`; `mode` enum
#     random,all,selected-nodes: core/models/models/spider.go
#   - generic create wraps the model under `data`
#     (controllers/base.go PostParams{Data T `json:"data"`})
#   - POST /spiders/:id/files/save {path,data} writes a spider file
#     (so the worker has a script + a real workspace to sync):
#     core/controllers/spider.go PostSpiderSaveFile
#   - POST /spiders/:id/run {mode,cmd} -> data:[<taskId>,...]:
#     core/controllers/spider.go PostSpiderRun, router.go
#   - GET /tasks/:id -> {data:{status,...}}: core/controllers/task.go;
#     status enum pending,assigned,running,finished,error,cancelled,
#     abnormal: core/constants/task.go
#   - task {_id,spider_id,status,cmd,node_id,mode}; Mongo collection
#     `tasks` (tag collection:"tasks"): core/models/models/task.go;
#     random mode enqueues a task a worker claims over gRPC, syncs the
#     spider files, and runs `cmd` in the synced workspace:
#     core/spider/admin/service.go, core/task/handler/runner_*.go
#   - default admin/admin on first boot: core/user/service.go
#   - GET /health -> 200: core/controllers/health.go
#
# Ports: backend 8090 (off Crawlab's own 8080, held by the dev-proxy),
# gRPC 9666; throwaway Mongo on host 27018, db `crawlab`. `scripts/up.sh`
# runs a Pro master + worker (see its header and ../README.md).

verification: Crawlab — run a spider task to completion and read the lifecycle from Mongo

environment:
  up: ./scripts/up.sh
  down: ./scripts/down.sh
  ready:
    http:
      url: $inputs.health_url
      timeout: 180s

inputs:
  # Absolute URLs, passed whole (string interpolation isn't shipped).
  health_url:
    type: string
    default: http://127.0.0.1:8090/health
  login_url:
    type: string
    default: http://127.0.0.1:8090/login
  # Base collection URL; the run endpoint is `<spiders_url>/<id>/run` and
  # the file-save endpoint `<spiders_url>/<id>/files/save`, both composed
  # with $runtime.format from the created spider's id.
  spiders_url:
    type: string
    default: http://127.0.0.1:8090/spiders
  # Base task URL; the lifecycle is polled at `<tasks_url>/<taskId>`.
  tasks_url:
    type: string
    default: http://127.0.0.1:8090/tasks
  # The throwaway Mongo `up.sh` publishes (host 27018, db `crawlab`).
  # `db/query` routes mongodb:// URLs to its `find:` path; the spider
  # lands in `spiders`, the task in `tasks`.
  mongo_url:
    type: string
    default: mongodb://127.0.0.1:27018/crawlab
  username:
    type: string
    default: admin
  password:
    type: string
    default: admin
  spider_name:
    type: string
    default: duhem-lifecycle-spider
  # The spider runs a real script the worker syncs and executes. `cmd`
  # invokes the file below; the file is a trivial, deterministic command
  # so the task drives to `finished`. The cmd string also round-trips
  # onto the task, so `db/query` can filter `tasks` by it (a string field
  # — no ObjectId-typed filter needed).
  spider_cmd:
    type: string
    default: bash main.sh
  spider_file_path:
    type: string
    default: main.sh
  spider_file_data:
    type: string
    default: "echo hello-from-duhem-lifecycle\n"

criteria:
  - id: AC-1
    description: |
      Creating a spider persists it to the database: the spider exists as
      a real document in Crawlab's Mongo `spiders` collection with the
      supplied name and command — not merely echoed by the API.
    checks:
      - id: AC-1.1
        description: |
          Log in, POST a new spider, then read the `spiders` collection in
          Crawlab's real MongoDB with `db/query` and confirm the document
          is there — same `_id` the API returned, same name and command.
          The deep DB-state slice: it asserts what landed in the store,
          read straight from Mongo.
        steps:
          - id: login
            uses: api/call
            with:
              method: POST
              url: $inputs.login_url
              headers: { Content-Type: application/json }
              body:
                username: $inputs.username
                password: $inputs.password
              within: 15s
            outputs:
              body: body
          - id: create
            uses: api/call
            with:
              method: POST
              url: $inputs.spiders_url
              headers:
                Content-Type: application/json
                Authorization: $steps.login.outputs.body.data
              body:
                data:
                  name: $inputs.spider_name
                  cmd: $inputs.spider_cmd
                  mode: random
              within: 15s
            outputs:
              status: status
              body: body
          - id: persisted
            uses: db/query
            with:
              connection: $inputs.mongo_url
              find:
                collection: spiders
                filter:
                  name: $inputs.spider_name
                sort:
                  _id: -1
                limit: 1
              within: 15s
            outputs:
              rows: rows
              row_count: row_count
        assertions:
          - $steps.create.outputs.status == 200
          # The spider is really in Mongo, read straight from the store.
          - $steps.persisted.outputs.row_count >= 1
          - $steps.persisted.outputs.rows[0].name == $inputs.spider_name
          - $steps.persisted.outputs.rows[0].cmd == $inputs.spider_cmd
          # And it's the very spider the API created.
          - $steps.persisted.outputs.rows[0]._id == $steps.create.outputs.body.data._id

  - id: AC-2
    description: |
      Running a spider executes a task to completion: the run is claimed
      by a worker, the spider's files are synced, the command runs, and
      the task drives to the terminal `finished` state — the full
      distributed lifecycle, with the terminal state read from the real
      database, not inferred from the API.
    checks:
      - id: AC-2.1
        description: |
          Log in, create a spider, save a trivial script onto it, then run
          it. Poll the task over REST until it reports `finished`
          (`api/poll`, the async wait), then read the `tasks` collection
          in Mongo directly and confirm the persisted task really reached
          `finished` carrying the spider's command. This exercises master
          scheduling + worker execution over gRPC and asserts the outcome
          at the database layer.
        steps:
          - id: login
            uses: api/call
            with:
              method: POST
              url: $inputs.login_url
              headers: { Content-Type: application/json }
              body:
                username: $inputs.username
                password: $inputs.password
              within: 15s
            outputs:
              body: body
          - id: create
            uses: api/call
            with:
              method: POST
              url: $inputs.spiders_url
              headers:
                Content-Type: application/json
                Authorization: $steps.login.outputs.body.data
              body:
                data:
                  name: $inputs.spider_name
                  cmd: $inputs.spider_cmd
                  mode: random
              within: 15s
            outputs:
              body: body
          - id: savefile
            uses: api/call
            with:
              method: POST
              # `<spiders_url>/<id>/files/save` — gives the spider a real
              # script and a workspace the worker can sync and run.
              url: $runtime.format("{}/{}/files/save", $inputs.spiders_url, $steps.create.outputs.body.data._id)
              headers:
                Content-Type: application/json
                Authorization: $steps.login.outputs.body.data
              body:
                path: $inputs.spider_file_path
                data: $inputs.spider_file_data
              within: 15s
            outputs:
              status: status
          - id: run
            uses: api/call
            with:
              method: POST
              url: $runtime.format("{}/{}/run", $inputs.spiders_url, $steps.create.outputs.body.data._id)
              headers:
                Content-Type: application/json
                Authorization: $steps.login.outputs.body.data
              body:
                mode: random
                cmd: $inputs.spider_cmd
              within: 15s
            outputs:
              status: status
              body: body
          - id: awaited
            uses: api/poll
            with:
              method: GET
              # Poll `<tasks_url>/<taskId>` until the lifecycle reaches the
              # terminal `finished` state (the real worker has executed it).
              url: $runtime.format("{}/{}", $inputs.tasks_url, $steps.run.outputs.body.data[0])
              headers:
                Authorization: $steps.login.outputs.body.data
              within: 90s
              interval: 2s
              until:
                path: data.status
                equals: finished
            outputs:
              satisfied: satisfied
          - id: executed
            uses: db/query
            with:
              connection: $inputs.mongo_url
              find:
                collection: tasks
                # Filter by the command string (no ObjectId-typed filter
                # needed); newest first picks the task we just ran.
                filter:
                  cmd: $inputs.spider_cmd
                sort:
                  _id: -1
                limit: 1
              within: 15s
            outputs:
              rows: rows
              row_count: row_count
        assertions:
          - $steps.savefile.outputs.status == 200
          - $steps.run.outputs.status == 200
          # The worker drove the task to the terminal state within budget.
          - $steps.awaited.outputs.satisfied == true
          # And the persisted task in Mongo really reached `finished`,
          # carrying the spider's command.
          - $steps.executed.outputs.row_count >= 1
          - $steps.executed.outputs.rows[0].status == "finished"
          - $steps.executed.outputs.rows[0].cmd == $inputs.spider_cmd

  - id: AC-3
    description: |
      The executed task references exactly the spider that was created and
      is the task the run reported — the spider → task link is real in the
      database, not just implied by the API call sequence. One holistic
      slice spanning a REST create, a save, a run, an executed task, and a
      direct Mongo read.
    checks:
      - id: AC-3.1
        description: |
          Create a spider, save its script, run it to completion, then read
          the persisted task from Mongo and confirm its `spider_id` is
          exactly the created spider's `_id` and its `_id` is the task the
          run reported. The ObjectIDs are read from the store and surface
          as 24-hex strings (db/query's BSON→JSON mapping), directly
          comparable to the ids the API returned — referential integrity
          verified at the database layer.
        steps:
          - id: login
            uses: api/call
            with:
              method: POST
              url: $inputs.login_url
              headers: { Content-Type: application/json }
              body:
                username: $inputs.username
                password: $inputs.password
              within: 15s
            outputs:
              body: body
          - id: create
            uses: api/call
            with:
              method: POST
              url: $inputs.spiders_url
              headers:
                Content-Type: application/json
                Authorization: $steps.login.outputs.body.data
              body:
                data:
                  name: $inputs.spider_name
                  cmd: $inputs.spider_cmd
                  mode: random
              within: 15s
            outputs:
              body: body
          - id: savefile
            uses: api/call
            with:
              method: POST
              url: $runtime.format("{}/{}/files/save", $inputs.spiders_url, $steps.create.outputs.body.data._id)
              headers:
                Content-Type: application/json
                Authorization: $steps.login.outputs.body.data
              body:
                path: $inputs.spider_file_path
                data: $inputs.spider_file_data
              within: 15s
          - id: run
            uses: api/call
            with:
              method: POST
              url: $runtime.format("{}/{}/run", $inputs.spiders_url, $steps.create.outputs.body.data._id)
              headers:
                Content-Type: application/json
                Authorization: $steps.login.outputs.body.data
              body:
                mode: random
                cmd: $inputs.spider_cmd
              within: 15s
            outputs:
              body: body
          - id: awaited
            uses: api/poll
            with:
              method: GET
              url: $runtime.format("{}/{}", $inputs.tasks_url, $steps.run.outputs.body.data[0])
              headers:
                Authorization: $steps.login.outputs.body.data
              within: 90s
              interval: 2s
              until:
                path: data.status
                equals: finished
          - id: executed
            uses: db/query
            with:
              connection: $inputs.mongo_url
              find:
                collection: tasks
                filter:
                  cmd: $inputs.spider_cmd
                sort:
                  _id: -1
                limit: 1
              within: 15s
            outputs:
              rows: rows
        assertions:
          # The task in Mongo links to exactly the spider we created.
          - $steps.executed.outputs.rows[0].spider_id == $steps.create.outputs.body.data._id
          # And it is the task the run endpoint reported.
          - $steps.executed.outputs.rows[0]._id == $steps.run.outputs.body.data[0]
