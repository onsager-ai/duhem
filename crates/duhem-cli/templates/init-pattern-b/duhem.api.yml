# yaml-language-server: $schema={{SCHEMA}}
# {{NAME}} — Duhem init skeleton (Pattern B)
#
# Generated by `duhem init --pattern B`. Edit this file to verify
# your real workload. The skeleton below runs end-to-end against
# https://example.com (a stable public page) with a browser-free
# `api/call` check, so `duhem run` goes green with only a network
# connection — no browser to install. (For the visual, browser-
# driven variant: `duhem init … --pattern B --kind ui`.)
#
# Pattern B (per `docs/duhem-spec.md` §10.4) co-locates per-
# feature Verification Definitions under a directory referenced
# by a sibling root manifest (`../duhem.yml`). Criteria prose
# lives next door in `criteria.md`.

verification: {{NAME}} — Duhem init skeleton

inputs:
  base_url:
    type: string
    default: https://example.com

criteria:
  - id: AC-1
    description: |
      The example.com endpoint responds successfully. Replace this
      criterion with your own intent statement before flipping the
      spec issue to `planned`.
    checks:
      - id: AC-1.1
        description: |
          Request the landing page and confirm it answers 200.
        steps:
          - id: home
            uses: api/call
            with:
              method: GET
              url: $inputs.base_url
              within: 15s
            outputs:
              status: status
        assertions:
          - $steps.home.outputs.status == 200
