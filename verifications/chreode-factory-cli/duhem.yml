# Chreode — the factory CLI builds and ships an app (dogfood)
#
# Worked example for `cli/invoke` (#102). Criteria prose:
# `./criteria.md`. Operator setup: `./README.md`.
#
# Chreode's `pnpm chreode "<description>"` is its headless entry point —
# the whole factory pipeline (understand → plan → generate → verify →
# deploy → promote) with no server and no dashboard. This VD drives the
# REAL CLI via `cli/invoke` and judges its exit code and output.
#
# Holistic posture (`docs/duhem-spec.md` §8): `cli/invoke` runs the real
# binary in the real environment — no shimmed shell, no fake exit code.
# Determinism without mocking comes from Chreode's default mode: FakeAgent
# (no live LLM, `CHREODE_AGENT` unset) + dry-run drivers (`CHREODE_DRIVERS`
# unset), where the dry-run deploy stands up a real local preview server
# and the CLI prints `shipped → <url>` on success.
#
# Note: the runtime still opens a browser for the check even though no
# step touches it — `cli/invoke`, like `api/call`, reports
# `requires_page = true` today (stripping the browser for non-UI checks
# is a deferred optimization). So a Playwright Chromium must be
# available (see ./README.md and #105).

verification: Chreode — the factory CLI builds and ships an app

inputs:
  # Path to an onsager-ai/chreode checkout, used as the CLI's working
  # directory. `cli/invoke` resolves a relative `cwd` against the
  # `duhem` process working directory (where `duhem run` is invoked),
  # NOT this VD's directory — the default below assumes you run from the
  # duhem repo root, where `../chreode` is a sibling checkout. Override
  # with `--inputs chreode_repo_dir=/abs/path` for any other layout.
  chreode_repo_dir:
    type: string
    default: ../chreode
  app_description:
    type: string
    default: A reading list with progress tracking

criteria:
  - id: AC-1
    description: |
      Running the factory CLI with a plain-language description builds
      an app end to end — understand, plan, generate, verify, deploy —
      and exits successfully, reporting that it shipped a reachable app.
    checks:
      - id: AC-1.1
        description: |
          Run `pnpm chreode "<description>"` in the Chreode checkout and
          judge the real process: a clean exit (code 0) and a final
          `shipped → <url>` line prove the whole pipeline ran and
          promoted a live app through the CLI.
        steps:
          - id: factory
            uses: cli/invoke
            with:
              # argv form (no shell) — the description is one argument,
              # no quoting hazard. Runs in the Chreode checkout so pnpm
              # resolves the workspace.
              command: [pnpm, factory, $inputs.app_description]
              cwd: $inputs.chreode_repo_dir
              within: 180s
            outputs:
              exit_code: exit_code
              stdout: stdout
        assertions:
          - $steps.factory.outputs.exit_code == 0
          - matches:
              value: $steps.factory.outputs.stdout
              pattern: "shipped"
