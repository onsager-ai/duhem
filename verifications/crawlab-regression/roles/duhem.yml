# yaml-language-server: $schema=../../../schema/duhem.schema.json
# Crawlab regression suite leaf — role management (API-018)
#
# A faithful Duhem port of crawlab-team/crawlab-test's
# `specs/api/API-018-role-management.md`. A suite leaf (no own
# `environment:`): it runs against the shared LICENSED Pro cluster the
# parent manifest (`../duhem.yml`) provisions. Standalone, run with
# `--no-env-up` and pass the inherited inputs via `--inputs`.
#
# Surface: GET /api/roles, GET /api/roles/{id}, PUT /api/roles/{id},
# DELETE /api/roles/{id}. Per API-018 there is NO create endpoint — roles
# are seeded by the system — so this leaf exercises the read/update/delete
# surface over the default roles and confirms the `roles` collection
# directly in Mongo.
#
# Provenance — confirmed vs inferred:
#   - Endpoint paths + `/api` prefix + admin/admin + login envelope:
#     CONFIRMED (see ../auth-tokens/duhem.yml provenance). API-018's own
#     paths omit `/api` (it documents `/roles`) but the Pro `develop` image
#     serves everything under `/api`; CONFIRMED against the suite's other
#     leaves.
#   - Single-resource read returns `{data:<role>}`: CONFIRMED envelope.
#   - Role documents carry `pages` + `permissions` arrays and a
#     `root_admin` bool: per API-018's "Role Structure" key validations.
#     The derived `is_root_admin` field is NOT asserted (computed, not
#     stored). FLAG `pages`/`permissions` field names to confirm.
#   - PUT update body wraps under `data` ({data:{name,description}}):
#     INFERRED from the generic update envelope; PUT replaces the resource,
#     so a minimal body MAY drop pages/permissions — acceptable on the
#     throwaway cluster, but FLAG the PUT-replace semantics.
#   - Default/system roles are PROTECTED from deletion (AC-3): per API-018
#     step 11 / error case (400/403). Asserted as 4xx; if crawlab allows
#     deleting a root role, this fails and surfaces reality. FLAG inferred.

verification: Crawlab — role management (API-018)
spec_ref: crawlab-team/crawlab-test specs/api/API-018-role-management.md

# OWN inputs: the roles endpoint + the description this leaf writes onto an
# existing role. Shared login URL + admin credentials + Mongo URL are
# inherited from the parent manifest (spec #135). The endpoint URL mirrors
# that manifest's host:port.
inputs:
  roles_url:
    type: string
    default: http://127.0.0.1:8090/api/roles
  updated_role_description:
    type: string
    default: duhem-regr-role-description

inherits:
  - login_url
  - mongo_url
  - password
  - username

criteria:
  - id: AC-1
    description: |
      The system ships with real roles, backed by the database: the role
      list is non-empty, a role is fetchable by id with its permission shape
      (pages and permissions arrays), and the database confirms a root-admin
      role exists in the `roles` collection. Roles are genuine records, not a
      synthetic API response.
    checks:
      - id: AC-1.1
        description: |
          Log in, list roles (expecting the default roles), fetch the first
          role by id and confirm its permission arrays are present, then read
          the `roles` collection in Mongo to confirm a root-admin role
          exists.
        steps:
          - id: login
            uses: api/call
            with:
              method: POST
              url: $inputs.login_url
              headers: { Content-Type: application/json }
              body:
                username: $inputs.username
                password: $inputs.password
              within: 15s
            outputs:
              body: body
          - id: list
            uses: api/call
            with:
              method: GET
              url: $inputs.roles_url
              headers:
                Authorization: $steps.login.outputs.body.data
              within: 15s
            outputs:
              status: status
              body: body
          - id: get_one
            uses: api/call
            with:
              method: GET
              url: '$runtime.format("{}/{}", $inputs.roles_url, $steps.list.outputs.body.data[0]._id)'
              headers:
                Authorization: $steps.login.outputs.body.data
              within: 15s
            outputs:
              status: status
              body: body
          - id: root_db
            uses: db/query
            with:
              connection: $inputs.mongo_url
              find:
                collection: roles
                filter:
                  root_admin: true
                sort:
                  _id: -1
                limit: 1
              within: 15s
            outputs:
              rows: rows
              row_count: row_count
        assertions:
          - $steps.list.outputs.status == 200
          - $runtime.len($steps.list.outputs.body.data) >= 1
          - $steps.get_one.outputs.status == 200
          - $runtime.exists($steps.get_one.outputs.body.data.pages)
          - $runtime.exists($steps.get_one.outputs.body.data.permissions)
          # A root-admin role exists in the roles collection.
          - $steps.root_db.outputs.row_count >= 1
          - $steps.root_db.outputs.rows[0].root_admin == true

  - id: AC-2
    description: |
      A role update is durable: changing a role's description over REST
      lands in the database. Role edits are persisted, not merely
      acknowledged by the handler.
    checks:
      - id: AC-2.1
        description: |
          Log in, list roles, PUT a new description onto the first role,
          then read the `roles` collection back and confirm the new
          description persisted for that role.
        steps:
          - id: login
            uses: api/call
            with:
              method: POST
              url: $inputs.login_url
              headers: { Content-Type: application/json }
              body:
                username: $inputs.username
                password: $inputs.password
              within: 15s
            outputs:
              body: body
          - id: list
            uses: api/call
            with:
              method: GET
              url: $inputs.roles_url
              headers:
                Authorization: $steps.login.outputs.body.data
              within: 15s
            outputs:
              body: body
          - id: update
            uses: api/call
            with:
              method: PUT
              url: '$runtime.format("{}/{}", $inputs.roles_url, $steps.list.outputs.body.data[0]._id)'
              headers:
                Content-Type: application/json
                Authorization: $steps.login.outputs.body.data
              body:
                data:
                  name: $steps.list.outputs.body.data[0].name
                  description: $inputs.updated_role_description
              within: 15s
            outputs:
              status: status
          - id: persisted
            uses: db/query
            with:
              connection: $inputs.mongo_url
              find:
                collection: roles
                filter:
                  name: $steps.list.outputs.body.data[0].name
                sort:
                  _id: -1
                limit: 1
              within: 15s
            outputs:
              rows: rows
        assertions:
          - $steps.update.outputs.status == 200
          - $steps.persisted.outputs.rows[0].description == $inputs.updated_role_description

  - id: AC-3
    description: |
      Invalid and protected role operations are refused: fetching or
      updating a non-existent role is a 404, and deleting a protected
      system (root-admin) role is rejected with a client error. The system's
      access-control records are guarded, not freely mutable.
    checks:
      - id: AC-3.1
        description: |
          Fetch a role by a well-formed but non-existent id and confirm the
          response is 404 Not Found.
        steps:
          - id: login
            uses: api/call
            with:
              method: POST
              url: $inputs.login_url
              headers: { Content-Type: application/json }
              body:
                username: $inputs.username
                password: $inputs.password
              within: 15s
            outputs:
              body: body
          - id: get_missing
            uses: api/call
            with:
              method: GET
              url: '$runtime.format("{}/{}", $inputs.roles_url, "000000000000000000000000")'
              headers:
                Authorization: $steps.login.outputs.body.data
              within: 15s
            outputs:
              status: status
        assertions:
          - $steps.get_missing.outputs.status == 404
      - id: AC-3.2
        description: |
          Update a role by a well-formed but non-existent id and confirm the
          response is 404 Not Found.
        steps:
          - id: login
            uses: api/call
            with:
              method: POST
              url: $inputs.login_url
              headers: { Content-Type: application/json }
              body:
                username: $inputs.username
                password: $inputs.password
              within: 15s
            outputs:
              body: body
          - id: update_missing
            uses: api/call
            with:
              method: PUT
              url: '$runtime.format("{}/{}", $inputs.roles_url, "000000000000000000000000")'
              headers:
                Content-Type: application/json
                Authorization: $steps.login.outputs.body.data
              body:
                data:
                  name: duhem-regr-nonexistent-role
                  description: $inputs.updated_role_description
              within: 15s
            outputs:
              status: status
        assertions:
          - $steps.update_missing.outputs.status == 404
      - id: AC-3.3
        description: |
          Attempt to delete the protected root-admin role and confirm it is
          refused with a 4xx — system roles are protected from deletion.
        steps:
          - id: login
            uses: api/call
            with:
              method: POST
              url: $inputs.login_url
              headers: { Content-Type: application/json }
              body:
                username: $inputs.username
                password: $inputs.password
              within: 15s
            outputs:
              body: body
          - id: root_db
            uses: db/query
            with:
              connection: $inputs.mongo_url
              find:
                collection: roles
                filter:
                  root_admin: true
                sort:
                  _id: -1
                limit: 1
              within: 15s
            outputs:
              rows: rows
          - id: delete_root
            uses: api/call
            with:
              method: DELETE
              url: '$runtime.format("{}/{}", $inputs.roles_url, $steps.root_db.outputs.rows[0]._id)'
              headers:
                Authorization: $steps.login.outputs.body.data
              within: 15s
            outputs:
              status: status
        assertions:
          - $steps.delete_root.outputs.status >= 400
          - $steps.delete_root.outputs.status < 500
