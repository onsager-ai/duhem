# rust-cross-build — composite action.
#
# Build Cargo packages for a target triple in release mode and upload the
# resulting binaries as a `binary-<platform>` artifact for the publish job to
# copy into its npm platform package. The matrix builds natively per runner,
# so no cross-linker setup is needed.
name: rust-cross-build
description: Build Rust binaries for a target platform and upload them as an artifact.

inputs:
  target:
    description: Rust target triple (e.g. aarch64-apple-darwin).
    required: true
  packages:
    description: Comma-separated Cargo packages to build, paired with binaries (e.g. duhem-cli,duhem-dashboard).
    required: true
  binaries:
    description: Comma-separated binary filenames, including extensions, paired with packages (e.g. duhem,duhem-dashboard).
    required: true
  platform:
    description: Platform key for artifact naming (e.g. darwin-arm64).
    required: true

runs:
  using: composite
  steps:
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ inputs.target }}

    - name: Cache cargo build
      uses: Swatinem/rust-cache@v2
      with:
        shared-key: release-${{ inputs.platform }}

    - name: Build and stage binaries
      shell: bash
      run: |
        set -euo pipefail
        IFS=',' read -r -a packages <<< "${{ inputs.packages }}"
        IFS=',' read -r -a binaries <<< "${{ inputs.binaries }}"
        if [ "${#packages[@]}" -ne "${#binaries[@]}" ]; then
          echo "::error::packages and binaries must have the same number of entries"
          exit 1
        fi
        package_args=()
        for package in "${packages[@]}"; do
          package_args+=(--package "$package")
        done
        cargo build --release --locked "${package_args[@]}" --target "${{ inputs.target }}"
        mkdir -p "dist/${{ inputs.platform }}"
        for binary in "${binaries[@]}"; do
          cp "target/${{ inputs.target }}/release/$binary" "dist/${{ inputs.platform }}/$binary"
        done

    - name: Upload binary artifact
      uses: actions/upload-artifact@v7
      with:
        name: binary-${{ inputs.platform }}
        path: dist/${{ inputs.platform }}/
        if-no-files-found: error
        retention-days: 3
