# yaml-language-server: $schema={{SCHEMA}}
# {{NAME}} — Duhem init skeleton
#
# Generated by `duhem init`. Edit this file to verify your real
# workload. The skeleton below runs end-to-end against
# https://example.com (a stable public page) with a browser-free
# `api/call` check, so `duhem run` goes green with only a network
# connection — no browser to install. It's a known-good baseline
# to mutate: replace the criterion, the request, and the assertion
# as you go.
#
# Want the visual, browser-driven variant instead? Scaffold with
# `duhem init … --kind ui` (then `duhem browser install` once).
#
# Criteria prose lives next door in `criteria.md` — keep that file
# in sync with intent (what "done" means) and let this file drift
# toward implementation (how we observe done). See
# `docs/duhem-spec.md` §7.2 / §7.3.

verification: {{NAME}} — Duhem init skeleton

inputs:
  base_url:
    type: string
    default: https://example.com

criteria:
  - id: AC-1
    description: |
      The example.com endpoint responds successfully. Replace this
      criterion with your own intent statement before you start.
      Keep the language stable: a non-technical stakeholder should
      be able to decide yes/no without reading the YAML below.
    checks:
      - id: AC-1.1
        description: |
          Request the landing page and confirm it answers 200.
        steps:
          - id: home
            uses: api/call
            with:
              method: GET
              url: $inputs.base_url
              within: 15s
            outputs:
              status: status
        assertions:
          - $steps.home.outputs.status == 200
