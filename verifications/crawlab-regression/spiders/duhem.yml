# yaml-language-server: $schema=../../../schema/duhem.schema.json
# Crawlab regression suite leaf — spider CRUD operations (API-004)
#
# A faithful Duhem port of crawlab-team/crawlab-test's
# `specs/api/API-004-spider-crud-operations.md`. A suite leaf (no own
# `environment:`): it runs against the shared LICENSED Pro cluster the
# parent manifest (`../duhem.yml`) provisions. Standalone, run it with
# `--no-env-up` against an already-up crawlab-pro and pass the inherited
# inputs with `--inputs`.
#
# Covers the spec's surface: POST /api/spiders, GET /api/spiders/{id},
# GET /api/spiders, PATCH /api/spiders/{id}, PUT /api/spiders/{id},
# DELETE /api/spiders/{id} — all mechanical `api/call`, with a `db/query`
# on Mongo's `spiders` collection where it adds real DB-state depth
# (a created/updated/deleted spider read straight from the store, not
# echoed by the handler).
#
# POSTURE — keep finding (Duhem #160/#167): these assertions encode the
# CORRECT contract the API-004 spec describes, NOT crawlab-pro's observed
# behavior. A real product defect surfaces as RED here; we do not bake
# buggy behavior in to force green.
#
# Provenance — confirmed vs INFERRED (cite the contract, not guesses):
#   - `/api` prefix + admin/admin + bare `Authorization: <token>` (no
#     Bearer) + login returns the JWT under `{data:<token>}`: CONFIRMED
#     from the auth-tokens leaf (../auth-tokens) and the proven lifecycle
#     VD (../../crawlab-spider-task-lifecycle; core/controllers/login.go).
#   - spider model `{_id,name,cmd,mode,...}`, Mongo collection `spiders`,
#     exec field `cmd`, `mode` enum random/all/selected-nodes, generic
#     create wraps the model under `data` ({data:{...}}), single-resource
#     read returns `{data:<model>}`: CONFIRMED from the lifecycle VD
#     (core/models/models/spider.go, controllers/base.go).
#   - optional fields `description`, `priority` (default 5), `col_name`:
#     INFERRED from API-004 §4 + its Notes. Confirm the exact crawlab-pro
#     field names against source on the first live run.
#   - list endpoint returns `{data:[...], total:N}` and honours
#     `?page=&size=`: INFERRED from API-004 §5 + the generic list
#     controller; the auth leaf found `/api/tokens` LIST panics, so list
#     behavior is per-controller — assert the spec contract and let the
#     live run show reality.
#   - PATCH = partial update (only named fields change), PUT = full
#     replace, both `{data:{...}}`-wrapped, `_id` stable across update:
#     INFERRED from API-004 §6/§7 + the generic update controller.
#   - duplicate name rejected with 4xx (AC-6): a CONTRACT CLAIM from
#     API-004 §8 + its Notes ("Spider names should be unique"). The proven
#     lifecycle VD creates the SAME spider name across three checks and
#     runs green, so crawlab-pro likely does NOT enforce uniqueness —
#     expect AC-6 RED on the first live run (a finding, or a spec the
#     product chooses not to honour). FLAG for the maintainer.
#   - invalid id → 404 (AC-5): CONFIRMED contract from API-004 §9.

verification: Crawlab — spider CRUD operations (API-004)
spec_ref: crawlab-team/crawlab-test specs/api/API-004-spider-crud-operations.md

# This leaf's OWN inputs: the spider identities it creates. Each check
# uses a DISTINCT name so its `spiders` Mongo filter is exact and
# independent — the delete check can assert "count by name == 0" and the
# duplicate check gets a clean first create. The cluster endpoints +
# credentials + mongo URL are inherited from the parent manifest's
# `environments:` block (spec #135).
inputs:
  # AC-1 — create with the full optional-field set (API-004 §4).
  name_create:
    type: string
    default: duhem-spider-crud-create
  cmd_create:
    type: string
    default: python main.py
  description_create:
    type: string
    default: Duhem regression spider with full configuration
  priority_create:
    type: integer
    default: 7
  col_name_create:
    type: string
    default: duhem_crud_results
  # AC-2 — list.
  name_list:
    type: string
    default: duhem-spider-crud-list
  # AC-3 — update (PATCH then PUT).
  name_update:
    type: string
    default: duhem-spider-crud-update
  cmd_update:
    type: string
    default: python main.py
  description_patched:
    type: string
    default: Duhem updated description
  name_replaced:
    type: string
    default: duhem-spider-crud-update-replaced
  cmd_replaced:
    type: string
    default: python spider.py
  # AC-4 — delete.
  name_delete:
    type: string
    default: duhem-spider-crud-delete
  cmd_delete:
    type: string
    default: python main.py
  # AC-5 — invalid id (a syntactically valid but non-existent ObjectID).
  bad_id:
    type: string
    default: "000000000000000000000000"
  # AC-6 — duplicate name.
  name_dup:
    type: string
    default: duhem-spider-crud-dup
  cmd_dup:
    type: string
    default: python main.py

# Inherited from the parent manifest's `environments:` block (spec #135).
# Run under the suite so they bind; standalone, pass them with
# `--inputs login_url=... spiders_url=... mongo_url=... ...`.
inherits:
  - login_url
  - spiders_url
  - mongo_url
  - username
  - password

criteria:
  - id: AC-1
    description: |
      Creating a spider persists it to the database with every field it was
      given: the spider exists as a real document in Crawlab's Mongo
      `spiders` collection — same `_id` the API returned, and the supplied
      name, command, mode, description, priority and result-collection — not
      merely echoed by the handler.
    checks:
      - id: AC-1.1
        description: |
          Log in, POST a spider with the full optional-field set, then read
          the `spiders` collection in Mongo with `db/query` and confirm the
          document landed with the API's `_id` and all supplied fields.
        steps:
          - id: login
            uses: api/call
            with:
              method: POST
              url: $inputs.login_url
              headers: { Content-Type: application/json }
              body:
                username: $inputs.username
                password: $inputs.password
              within: 15s
            outputs:
              body: body
          - id: create
            uses: api/call
            with:
              method: POST
              url: $inputs.spiders_url
              headers:
                Content-Type: application/json
                Authorization: $steps.login.outputs.body.data
              body:
                data:
                  name: $inputs.name_create
                  cmd: $inputs.cmd_create
                  mode: random
                  description: $inputs.description_create
                  priority: $inputs.priority_create
                  col_name: $inputs.col_name_create
              within: 15s
            outputs:
              status: status
              body: body
          - id: persisted
            uses: db/query
            with:
              connection: $inputs.mongo_url
              find:
                collection: spiders
                filter:
                  name: $inputs.name_create
                sort:
                  _id: -1
                limit: 1
              within: 15s
            outputs:
              rows: rows
              row_count: row_count
        assertions:
          - $steps.create.outputs.status == 200
          - $runtime.exists($steps.create.outputs.body.data._id)
          # The spider is really in Mongo, read straight from the store.
          - $steps.persisted.outputs.row_count >= 1
          - $steps.persisted.outputs.rows[0]._id == $steps.create.outputs.body.data._id
          - $steps.persisted.outputs.rows[0].name == $inputs.name_create
          - $steps.persisted.outputs.rows[0].cmd == $inputs.cmd_create
          # Optional fields persisted too (INFERRED field names — confirm live).
          - $steps.persisted.outputs.rows[0].description == $inputs.description_create
          - $steps.persisted.outputs.rows[0].priority == $inputs.priority_create
          - $steps.persisted.outputs.rows[0].col_name == $inputs.col_name_create

  - id: AC-2
    description: |
      A created spider is retrievable by id and appears in the collection
      listing: GET by id returns the same spider, and the list endpoint
      serves it with a total count. Read works for both the single-resource
      and the collection shape.
    checks:
      - id: AC-2.1
        description: |
          Log in, create a spider, fetch it by id (same `_id`, same name),
          then list spiders and confirm the listing is non-empty and carries
          a total count.
        steps:
          - id: login
            uses: api/call
            with:
              method: POST
              url: $inputs.login_url
              headers: { Content-Type: application/json }
              body:
                username: $inputs.username
                password: $inputs.password
              within: 15s
            outputs:
              body: body
          - id: create
            uses: api/call
            with:
              method: POST
              url: $inputs.spiders_url
              headers:
                Content-Type: application/json
                Authorization: $steps.login.outputs.body.data
              body:
                data:
                  name: $inputs.name_list
                  cmd: $inputs.cmd_create
                  mode: random
              within: 15s
            outputs:
              body: body
          - id: get_one
            uses: api/call
            with:
              method: GET
              url: '$runtime.format("{}/{}", $inputs.spiders_url, $steps.create.outputs.body.data._id)'
              headers:
                Authorization: $steps.login.outputs.body.data
              within: 15s
            outputs:
              status: status
              body: body
          - id: list
            uses: api/call
            with:
              method: GET
              # Crawlab list controllers commonly require ?page=&size=;
              # assert the spec's "list + total" contract (API-004 §5).
              url: '$runtime.format("{}?page=1&size=20", $inputs.spiders_url)'
              headers:
                Authorization: $steps.login.outputs.body.data
              within: 15s
            outputs:
              status: status
              body: body
        assertions:
          - $steps.get_one.outputs.status == 200
          - $steps.get_one.outputs.body.data._id == $steps.create.outputs.body.data._id
          - $steps.get_one.outputs.body.data.name == $inputs.name_list
          # The list endpoint serves the spiders with a total count.
          - $steps.list.outputs.status == 200
          - $runtime.len($steps.list.outputs.body.data) >= 1
          - $steps.list.outputs.body.total >= 1

  - id: AC-3
    description: |
      Updates are real and persisted at the database layer: a partial update
      (PATCH) changes only the named fields and leaves the rest intact, and a
      full replace (PUT) replaces the fields while keeping the same `_id`.
      Verified by reading the `spiders` document back from Mongo, not by
      trusting the handler's response.
    checks:
      - id: AC-3.1
        description: |
          Create a spider, PATCH a subset of fields and confirm in Mongo that
          only those changed (name unchanged), then PUT a full replacement and
          confirm in Mongo the new fields landed under the same `_id`.
        steps:
          - id: login
            uses: api/call
            with:
              method: POST
              url: $inputs.login_url
              headers: { Content-Type: application/json }
              body:
                username: $inputs.username
                password: $inputs.password
              within: 15s
            outputs:
              body: body
          - id: create
            uses: api/call
            with:
              method: POST
              url: $inputs.spiders_url
              headers:
                Content-Type: application/json
                Authorization: $steps.login.outputs.body.data
              body:
                data:
                  name: $inputs.name_update
                  cmd: $inputs.cmd_update
                  mode: random
                  priority: 5
              within: 15s
            outputs:
              body: body
          - id: patch
            uses: api/call
            with:
              method: PATCH
              url: '$runtime.format("{}/{}", $inputs.spiders_url, $steps.create.outputs.body.data._id)'
              headers:
                Content-Type: application/json
                Authorization: $steps.login.outputs.body.data
              body:
                data:
                  description: $inputs.description_patched
                  priority: 8
              within: 15s
            outputs:
              status: status
          - id: after_patch
            uses: db/query
            with:
              connection: $inputs.mongo_url
              find:
                collection: spiders
                # Read by the stable _id (not the mutated name): if PATCH wipes
                # fields, the row is still found and the field assertions fail
                # crisply (vs an inconclusive 0-row read by a wiped name).
                filter:
                  _id: $steps.create.outputs.body.data._id
                sort:
                  _id: -1
                limit: 1
              within: 15s
            outputs:
              rows: rows
          - id: put
            uses: api/call
            with:
              method: PUT
              url: '$runtime.format("{}/{}", $inputs.spiders_url, $steps.create.outputs.body.data._id)'
              headers:
                Content-Type: application/json
                Authorization: $steps.login.outputs.body.data
              body:
                data:
                  name: $inputs.name_replaced
                  cmd: $inputs.cmd_replaced
                  mode: all
                  priority: 9
              within: 15s
            outputs:
              status: status
          - id: after_put
            uses: db/query
            with:
              connection: $inputs.mongo_url
              find:
                collection: spiders
                filter:
                  _id: $steps.create.outputs.body.data._id
                sort:
                  _id: -1
                limit: 1
              within: 15s
            outputs:
              rows: rows
              row_count: row_count
        assertions:
          # PATCH changed only the named fields; name is untouched.
          - $steps.patch.outputs.status == 200
          - $steps.after_patch.outputs.rows[0].priority == 8
          - $steps.after_patch.outputs.rows[0].description == $inputs.description_patched
          - $steps.after_patch.outputs.rows[0].name == $inputs.name_update
          # PUT replaced the fields under the SAME _id.
          - $steps.put.outputs.status == 200
          - $steps.after_put.outputs.row_count >= 1
          - $steps.after_put.outputs.rows[0]._id == $steps.create.outputs.body.data._id
          - $steps.after_put.outputs.rows[0].cmd == $inputs.cmd_replaced
          - $steps.after_put.outputs.rows[0].priority == 9

  - id: AC-4
    description: |
      Deletion is permanent and verifiable at the database layer: a deleted
      spider is gone from the API (a re-fetch is refused with 404) AND gone
      from Mongo (no document with its name remains). Cleanup is real, not
      a soft flag the handler hides.
    checks:
      - id: AC-4.1
        description: |
          Create a spider, delete it, confirm a re-fetch returns 404, then
          read the `spiders` collection and confirm no document with that
          name survives.
        steps:
          - id: login
            uses: api/call
            with:
              method: POST
              url: $inputs.login_url
              headers: { Content-Type: application/json }
              body:
                username: $inputs.username
                password: $inputs.password
              within: 15s
            outputs:
              body: body
          - id: create
            uses: api/call
            with:
              method: POST
              url: $inputs.spiders_url
              headers:
                Content-Type: application/json
                Authorization: $steps.login.outputs.body.data
              body:
                data:
                  name: $inputs.name_delete
                  cmd: $inputs.cmd_delete
                  mode: random
              within: 15s
            outputs:
              body: body
          - id: delete
            uses: api/call
            with:
              method: DELETE
              url: '$runtime.format("{}/{}", $inputs.spiders_url, $steps.create.outputs.body.data._id)'
              headers:
                Authorization: $steps.login.outputs.body.data
              within: 15s
            outputs:
              status: status
          - id: get_gone
            uses: api/call
            with:
              method: GET
              url: '$runtime.format("{}/{}", $inputs.spiders_url, $steps.create.outputs.body.data._id)'
              headers:
                Authorization: $steps.login.outputs.body.data
              within: 15s
            outputs:
              status: status
          - id: gone_db
            uses: db/query
            with:
              connection: $inputs.mongo_url
              find:
                collection: spiders
                filter:
                  name: $inputs.name_delete
              within: 15s
            outputs:
              row_count: row_count
        assertions:
          - $steps.delete.outputs.status == 200
          - $steps.get_gone.outputs.status == 404
          # And the document is really gone from Mongo.
          - $steps.gone_db.outputs.row_count == 0

  - id: AC-5
    description: |
      The API reports a missing spider as missing: fetching a syntactically
      valid but non-existent id returns 404. Without this, the positive reads
      could pass against a handler that never checks existence.
    checks:
      - id: AC-5.1
        description: |
          Log in and GET a spider by a non-existent ObjectID; confirm 404.
        steps:
          - id: login
            uses: api/call
            with:
              method: POST
              url: $inputs.login_url
              headers: { Content-Type: application/json }
              body:
                username: $inputs.username
                password: $inputs.password
              within: 15s
            outputs:
              body: body
          - id: get_bad
            uses: api/call
            with:
              method: GET
              url: '$runtime.format("{}/{}", $inputs.spiders_url, $inputs.bad_id)'
              headers:
                Authorization: $steps.login.outputs.body.data
              within: 15s
            outputs:
              status: status
        assertions:
          - $steps.get_bad.outputs.status == 404

  - id: AC-6
    description: |
      Spider names are unique: creating a second spider with a name that
      already exists is refused with a 4xx client error (API-004 §8). NOTE —
      this is a CONTRACT CLAIM from the crawlab-test spec; the proven
      lifecycle VD reuses one spider name across checks and runs green, so
      crawlab-pro may not enforce uniqueness. If so, this check goes RED on
      the live run — a genuine finding (or a spec the product declines to
      honour), to be reconciled with the maintainer, not papered over.
    checks:
      - id: AC-6.1
        description: |
          Create a spider, then attempt to create another with the same name;
          confirm the first succeeds (200) and the duplicate is refused (4xx).
        steps:
          - id: login
            uses: api/call
            with:
              method: POST
              url: $inputs.login_url
              headers: { Content-Type: application/json }
              body:
                username: $inputs.username
                password: $inputs.password
              within: 15s
            outputs:
              body: body
          - id: create_first
            uses: api/call
            with:
              method: POST
              url: $inputs.spiders_url
              headers:
                Content-Type: application/json
                Authorization: $steps.login.outputs.body.data
              body:
                data:
                  name: $inputs.name_dup
                  cmd: $inputs.cmd_dup
                  mode: random
              within: 15s
            outputs:
              status: status
          - id: create_dup
            uses: api/call
            with:
              method: POST
              url: $inputs.spiders_url
              headers:
                Content-Type: application/json
                Authorization: $steps.login.outputs.body.data
              body:
                data:
                  name: $inputs.name_dup
                  cmd: $inputs.cmd_dup
                  mode: random
              within: 15s
            outputs:
              status: status
        assertions:
          - $steps.create_first.outputs.status == 200
          - $steps.create_dup.outputs.status >= 400
          - $steps.create_dup.outputs.status < 500
