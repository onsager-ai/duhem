# yaml-language-server: $schema=../../../schema/duhem.schema.json
# Crawlab regression suite leaf — projects & environments (API-019)
#
# A faithful Duhem port of crawlab-team/crawlab-test's
# `specs/api/API-019-projects-environments.md`. A suite leaf (no own
# `environment:`): it runs against the shared LICENSED Pro cluster the
# parent manifest (`../duhem.yml`) provisions. Standalone, run with
# `--no-env-up` and pass the inherited inputs via `--inputs`.
#
# Surface: POST/GET/PUT/DELETE /api/projects (+ /{id}) and
# POST/GET/PUT/DELETE /api/environments (+ /{id}) — the fuller sibling of
# the OSS-core ../../crawlab/projects slice, extended with the environment
# (key/value) resource. `db/query` on Mongo's `projects` + `environments`
# collections confirms both persist at the store.
#
# Provenance — confirmed vs inferred:
#   - Endpoint paths + `/api` prefix + admin/admin + login envelope:
#     CONFIRMED (see ../auth-tokens/duhem.yml provenance). API-019 documents
#     bare `/projects`/`/environments`; the Pro image serves them under
#     `/api`, CONFIRMED by ../../crawlab/projects.
#   - Project model {_id,name,description}, collection `projects`, generic
#     {data:{...}} create envelope: CONFIRMED from ../../crawlab/projects
#     (core/models/models/project.go, controllers/base.go).
#   - Environment model uses `key` + `value` fields (NOT name/description/
#     config), collection `environments`: CONFIRMED — API-019 calls this out
#     explicitly ("Important: Environment model uses key and value fields").
#   - PUT update body wraps under `data`: INFERRED from the generic update
#     envelope; PUT replaces the resource. FLAG to confirm.
#   - NOTE on framing: API-019 models environments as a STANDALONE key/value
#     resource, not as variables nested on a project. This leaf follows the
#     spec (the authoritative contract), so environments are exercised as
#     their own CRUD resource rather than as a sub-resource of a project.

verification: Crawlab — projects & environments (API-019)
spec_ref: crawlab-team/crawlab-test specs/api/API-019-projects-environments.md

# OWN inputs: the projects + environments endpoints and the test
# identities. Shared login URL + admin credentials + Mongo URL are
# inherited from the parent manifest (spec #135). The endpoint URLs mirror
# that manifest's host:port.
inputs:
  projects_url:
    type: string
    default: http://127.0.0.1:8090/api/projects
  environments_url:
    type: string
    default: http://127.0.0.1:8090/api/environments
  project_name:
    type: string
    default: duhem-regr-project
  project_description:
    type: string
    default: Created by the Duhem Crawlab regression suite
  updated_project_description:
    type: string
    default: duhem-regr-project-updated
  env_key:
    type: string
    default: DUHEM_REGR_KEY
  env_value:
    type: string
    default: duhem-regr-value
  updated_env_value:
    type: string
    default: duhem-regr-value-updated

inherits:
  - login_url
  - mongo_url
  - password
  - username

criteria:
  - id: AC-1
    description: |
      A project has a real CRUD lifecycle backed by the database: a project
      created over REST persists in Crawlab's Mongo `projects` collection
      with the same identifier and name, is listed and fetchable by id, can
      have its description updated (the change lands in the database), and
      once deleted is gone. Project CRUD is verified at the database layer,
      not echoed by the handler.
    checks:
      - id: AC-1.1
        description: |
          One holistic slice: log in, create a project, read the `projects`
          collection in Mongo to confirm it persisted with the API's `_id` +
          name, list and fetch by id, update the description via PUT and
          confirm the change landed in Mongo, then delete and confirm the
          re-fetch is refused.
        steps:
          - id: login
            uses: api/call
            with:
              method: POST
              url: $inputs.login_url
              headers: { Content-Type: application/json }
              body:
                username: $inputs.username
                password: $inputs.password
              within: 15s
            outputs:
              body: body
          - id: create
            uses: api/call
            with:
              method: POST
              url: $inputs.projects_url
              headers:
                Content-Type: application/json
                Authorization: $steps.login.outputs.body.data
              body:
                data:
                  name: $inputs.project_name
                  description: $inputs.project_description
              within: 15s
            outputs:
              status: status
              body: body
          - id: persisted
            uses: db/query
            with:
              connection: $inputs.mongo_url
              find:
                collection: projects
                filter:
                  name: $inputs.project_name
                sort:
                  _id: -1
                limit: 1
              within: 15s
            outputs:
              rows: rows
              row_count: row_count
          - id: list
            uses: api/call
            with:
              method: GET
              url: $inputs.projects_url
              headers:
                Authorization: $steps.login.outputs.body.data
              within: 15s
            outputs:
              status: status
              body: body
          - id: get_one
            uses: api/call
            with:
              method: GET
              url: '$runtime.format("{}/{}", $inputs.projects_url, $steps.create.outputs.body.data._id)'
              headers:
                Authorization: $steps.login.outputs.body.data
              within: 15s
            outputs:
              status: status
              body: body
          - id: update
            uses: api/call
            with:
              method: PUT
              url: '$runtime.format("{}/{}", $inputs.projects_url, $steps.create.outputs.body.data._id)'
              headers:
                Content-Type: application/json
                Authorization: $steps.login.outputs.body.data
              body:
                data:
                  name: $inputs.project_name
                  description: $inputs.updated_project_description
              within: 15s
            outputs:
              status: status
          - id: persisted_after
            uses: db/query
            with:
              connection: $inputs.mongo_url
              find:
                collection: projects
                filter:
                  name: $inputs.project_name
                sort:
                  _id: -1
                limit: 1
              within: 15s
            outputs:
              rows: rows
          - id: delete
            uses: api/call
            with:
              method: DELETE
              url: '$runtime.format("{}/{}", $inputs.projects_url, $steps.create.outputs.body.data._id)'
              headers:
                Authorization: $steps.login.outputs.body.data
              within: 15s
            outputs:
              status: status
          - id: get_gone
            uses: api/call
            with:
              method: GET
              url: '$runtime.format("{}/{}", $inputs.projects_url, $steps.create.outputs.body.data._id)'
              headers:
                Authorization: $steps.login.outputs.body.data
              within: 15s
            outputs:
              status: status
        assertions:
          - $steps.create.outputs.status == 200
          - $runtime.exists($steps.create.outputs.body.data._id)
          - $steps.persisted.outputs.row_count >= 1
          - $steps.persisted.outputs.rows[0].name == $inputs.project_name
          - $steps.persisted.outputs.rows[0]._id == $steps.create.outputs.body.data._id
          - $steps.list.outputs.status == 200
          - $runtime.len($steps.list.outputs.body.data) >= 1
          - $steps.get_one.outputs.status == 200
          - $steps.get_one.outputs.body.data.name == $inputs.project_name
          - $steps.update.outputs.status == 200
          - $steps.persisted_after.outputs.rows[0].description == $inputs.updated_project_description
          - $steps.delete.outputs.status == 200
          - $steps.get_gone.outputs.status == 404

  - id: AC-2
    description: |
      An environment has a real CRUD lifecycle backed by the database: an
      environment created over REST with a key and value persists in
      Crawlab's Mongo `environments` collection with those exact fields (key
      and value, not name/description), is listed and fetchable by id, can
      have its value updated (the change lands in the database), and once
      deleted is gone. Environment CRUD is verified at the database layer.
    checks:
      - id: AC-2.1
        description: |
          One holistic slice: log in, create an environment with a key +
          value, read the `environments` collection in Mongo to confirm the
          key/value persisted with the API's `_id`, list and fetch by id,
          update the value via PUT and confirm it landed in Mongo, then
          delete and confirm the re-fetch is refused.
        steps:
          - id: login
            uses: api/call
            with:
              method: POST
              url: $inputs.login_url
              headers: { Content-Type: application/json }
              body:
                username: $inputs.username
                password: $inputs.password
              within: 15s
            outputs:
              body: body
          - id: create
            uses: api/call
            with:
              method: POST
              url: $inputs.environments_url
              headers:
                Content-Type: application/json
                Authorization: $steps.login.outputs.body.data
              body:
                data:
                  key: $inputs.env_key
                  value: $inputs.env_value
              within: 15s
            outputs:
              status: status
              body: body
          - id: persisted
            uses: db/query
            with:
              connection: $inputs.mongo_url
              find:
                collection: environments
                filter:
                  key: $inputs.env_key
                sort:
                  _id: -1
                limit: 1
              within: 15s
            outputs:
              rows: rows
              row_count: row_count
          - id: list
            uses: api/call
            with:
              method: GET
              url: $inputs.environments_url
              headers:
                Authorization: $steps.login.outputs.body.data
              within: 15s
            outputs:
              status: status
              body: body
          - id: get_one
            uses: api/call
            with:
              method: GET
              url: '$runtime.format("{}/{}", $inputs.environments_url, $steps.create.outputs.body.data._id)'
              headers:
                Authorization: $steps.login.outputs.body.data
              within: 15s
            outputs:
              status: status
              body: body
          - id: update
            uses: api/call
            with:
              method: PUT
              url: '$runtime.format("{}/{}", $inputs.environments_url, $steps.create.outputs.body.data._id)'
              headers:
                Content-Type: application/json
                Authorization: $steps.login.outputs.body.data
              body:
                data:
                  key: $inputs.env_key
                  value: $inputs.updated_env_value
              within: 15s
            outputs:
              status: status
          - id: persisted_after
            uses: db/query
            with:
              connection: $inputs.mongo_url
              find:
                collection: environments
                filter:
                  key: $inputs.env_key
                sort:
                  _id: -1
                limit: 1
              within: 15s
            outputs:
              rows: rows
          - id: delete
            uses: api/call
            with:
              method: DELETE
              url: '$runtime.format("{}/{}", $inputs.environments_url, $steps.create.outputs.body.data._id)'
              headers:
                Authorization: $steps.login.outputs.body.data
              within: 15s
            outputs:
              status: status
          - id: get_gone
            uses: api/call
            with:
              method: GET
              url: '$runtime.format("{}/{}", $inputs.environments_url, $steps.create.outputs.body.data._id)'
              headers:
                Authorization: $steps.login.outputs.body.data
              within: 15s
            outputs:
              status: status
        assertions:
          - $steps.create.outputs.status == 200
          - $runtime.exists($steps.create.outputs.body.data._id)
          # The environment persisted with its key + value (not name/desc).
          - $steps.persisted.outputs.row_count >= 1
          - $steps.persisted.outputs.rows[0].key == $inputs.env_key
          - $steps.persisted.outputs.rows[0].value == $inputs.env_value
          - $steps.persisted.outputs.rows[0]._id == $steps.create.outputs.body.data._id
          - $steps.list.outputs.status == 200
          - $runtime.len($steps.list.outputs.body.data) >= 1
          - $steps.get_one.outputs.status == 200
          - $steps.get_one.outputs.body.data.key == $inputs.env_key
          # The value update lands in the database.
          - $steps.update.outputs.status == 200
          - $steps.persisted_after.outputs.rows[0].value == $inputs.updated_env_value
          - $steps.delete.outputs.status == 200
          - $steps.get_gone.outputs.status == 404

  - id: AC-3
    description: |
      Operations on non-existent resources are refused: fetching a project
      or an environment by a well-formed but non-existent id is a 404. The
      organizational resources return the right error, not a synthetic empty
      record.
    checks:
      - id: AC-3.1
        description: |
          Log in, then fetch a project and an environment by a well-formed
          but non-existent id and confirm both are 404 Not Found.
        steps:
          - id: login
            uses: api/call
            with:
              method: POST
              url: $inputs.login_url
              headers: { Content-Type: application/json }
              body:
                username: $inputs.username
                password: $inputs.password
              within: 15s
            outputs:
              body: body
          - id: project_missing
            uses: api/call
            with:
              method: GET
              url: '$runtime.format("{}/{}", $inputs.projects_url, "000000000000000000000000")'
              headers:
                Authorization: $steps.login.outputs.body.data
              within: 15s
            outputs:
              status: status
          - id: env_missing
            uses: api/call
            with:
              method: GET
              url: '$runtime.format("{}/{}", $inputs.environments_url, "000000000000000000000000")'
              headers:
                Authorization: $steps.login.outputs.body.data
              within: 15s
            outputs:
              status: status
        assertions:
          - $steps.project_missing.outputs.status == 404
          - $steps.env_missing.outputs.status == 404
