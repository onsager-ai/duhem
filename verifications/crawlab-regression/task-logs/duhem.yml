# yaml-language-server: $schema=../../../schema/duhem.schema.json
# Crawlab regression suite leaf — task logs & results (API-007)
#
# A faithful Duhem port of crawlab-team/crawlab-test's
# `specs/api/API-007-task-logs-results.md`. A suite leaf (no own
# `environment:`): runs against the shared LICENSED Pro cluster the parent
# manifest (`../duhem.yml`) provisions (master + worker). Standalone, run
# with `--no-env-up` against an already-up Pro cluster and pass the
# inherited inputs.
#
# Each check first drives a spider to a `finished` task using the PROVEN
# recipe (../../crawlab-spider-task-lifecycle), then exercises the
# logs/results endpoints on that task.
#
# POSTURE — keep finding (Duhem #160/#167): assertions encode the CORRECT
# contract; a real defect surfaces RED.
#
# Provenance — confirmed vs INFERRED:
#   - CONFIRMED (lifecycle VD): the create→save→run→poll-`finished` recipe;
#     a `bash main.sh` spider that `echo`-es a marker produces stdout the
#     worker captures as task logs.
#   - INFERRED (API-007 spec, confirm live): GET /tasks/{id}/logs ->
#     `{data:<string|array>, total:N}` honouring `?page=&size=` and
#     `?latest=`; GET /tasks/{id}/results -> `{data:[...], total:N}`;
#     invalid task id -> a 4xx/404 error.
#
# KNOWN EXPRESSIVENESS LIMITS (flagged for the maintainer, not faked):
#   - Logs may be a STRING or an ARRAY (API-007 explicitly). So a
#     content-substring assertion (logs contain the echoed marker) isn't
#     robustly expressible: `$runtime.matches` needs a string operand and
#     would go Inconclusive on the array form, and there is no array
#     `contains` helper (gap noted on #166). AC-1 asserts non-emptiness via
#     `$runtime.len(... ) >= 1`, which holds for both forms. A content
#     match needs either a normalized logs shape or a `contains` helper.
#   - The `bash main.sh` spider saves NO results (results need Crawlab's
#     Python result SDK). So AC-2 asserts the API-007 §3.2 contract — the
#     results endpoint returns a well-formed 200 response — NOT non-empty
#     results. Asserting non-empty results needs a result-saving spider
#     (Python SDK in the worker image); deferred + flagged.

verification: Crawlab — task logs & results (API-007)
spec_ref: crawlab-team/crawlab-test specs/api/API-007-task-logs-results.md

inputs:
  name_logs:
    type: string
    default: duhem-task-logs-spider
  name_results:
    type: string
    default: duhem-task-results-spider
  spider_cmd:
    type: string
    default: bash main.sh
  spider_file_path:
    type: string
    default: main.sh
  spider_file_data:
    type: string
    default: "echo hello-from-duhem-task-logs\n"
  # A syntactically valid but non-existent task ObjectID (edge case).
  bad_task_id:
    type: string
    default: "000000000000000000000000"

inherits:
  - login_url
  - spiders_url
  - tasks_url
  - username
  - password

criteria:
  - id: AC-1
    description: |
      A finished task exposes its execution logs: after a task runs to
      completion, the logs endpoint returns a non-empty body carrying the
      script's output, and the paginated form is accepted. Logs are the real
      captured stdout of the worker run, not an empty stub.
    checks:
      - id: AC-1.1
        description: |
          Log in, create a spider, save a script that echoes a marker, run it
          and poll until `finished`, then GET /tasks/{id}/logs (200,
          non-empty) and GET it again with `?page=1&size=100` (accepted).
        steps:
          - id: login
            uses: api/call
            with:
              method: POST
              url: $inputs.login_url
              headers: { Content-Type: application/json }
              body:
                username: $inputs.username
                password: $inputs.password
              within: 15s
            outputs:
              body: body
          - id: create
            uses: api/call
            with:
              method: POST
              url: $inputs.spiders_url
              headers:
                Content-Type: application/json
                Authorization: $steps.login.outputs.body.data
              body:
                data:
                  name: $inputs.name_logs
                  cmd: $inputs.spider_cmd
                  mode: random
              within: 15s
            outputs:
              body: body
          - id: savefile
            uses: api/call
            with:
              method: POST
              url: '$runtime.format("{}/{}/files/save", $inputs.spiders_url, $steps.create.outputs.body.data._id)'
              headers:
                Content-Type: application/json
                Authorization: $steps.login.outputs.body.data
              body:
                path: $inputs.spider_file_path
                data: $inputs.spider_file_data
              within: 15s
          - id: run
            uses: api/call
            with:
              method: POST
              url: '$runtime.format("{}/{}/run", $inputs.spiders_url, $steps.create.outputs.body.data._id)'
              headers:
                Content-Type: application/json
                Authorization: $steps.login.outputs.body.data
              body:
                mode: random
                cmd: $inputs.spider_cmd
              within: 15s
            outputs:
              body: body
          - id: awaited
            uses: api/poll
            with:
              method: GET
              url: '$runtime.format("{}/{}", $inputs.tasks_url, $steps.run.outputs.body.data[0])'
              headers:
                Authorization: $steps.login.outputs.body.data
              within: 90s
              interval: 2s
              until:
                path: data.status
                equals: finished
            outputs:
              satisfied: satisfied
          - id: logs
            uses: api/call
            with:
              method: GET
              url: '$runtime.format("{}/{}/logs", $inputs.tasks_url, $steps.run.outputs.body.data[0])'
              headers:
                Authorization: $steps.login.outputs.body.data
              within: 15s
            outputs:
              status: status
              body: body
          - id: logs_paged
            uses: api/call
            with:
              method: GET
              url: '$runtime.format("{}/{}/logs?page=1&size=100", $inputs.tasks_url, $steps.run.outputs.body.data[0])'
              headers:
                Authorization: $steps.login.outputs.body.data
              within: 15s
            outputs:
              status: status
        assertions:
          - $steps.awaited.outputs.satisfied == true
          # Logs endpoint returns a non-empty body (string or array form).
          - $steps.logs.outputs.status == 200
          - $runtime.exists($steps.logs.outputs.body.data)
          - $runtime.len($steps.logs.outputs.body.data) >= 1
          # The paginated form is accepted.
          - $steps.logs_paged.outputs.status == 200

  - id: AC-2
    description: |
      A finished task exposes a well-formed results endpoint: the results
      endpoint answers 200 with a `data` payload, even when the task saved no
      records (the empty-results contract from API-007 §3.2). This pins that
      the endpoint exists and is well-formed; asserting non-empty results
      needs a result-saving spider (flagged in the header).
    checks:
      - id: AC-2.1
        description: |
          Log in, create + run a spider to `finished`, then GET
          /tasks/{id}/results and confirm a well-formed 200 with a `data`
          payload.
        steps:
          - id: login
            uses: api/call
            with:
              method: POST
              url: $inputs.login_url
              headers: { Content-Type: application/json }
              body:
                username: $inputs.username
                password: $inputs.password
              within: 15s
            outputs:
              body: body
          - id: create
            uses: api/call
            with:
              method: POST
              url: $inputs.spiders_url
              headers:
                Content-Type: application/json
                Authorization: $steps.login.outputs.body.data
              body:
                data:
                  name: $inputs.name_results
                  cmd: $inputs.spider_cmd
                  mode: random
              within: 15s
            outputs:
              body: body
          - id: savefile
            uses: api/call
            with:
              method: POST
              url: '$runtime.format("{}/{}/files/save", $inputs.spiders_url, $steps.create.outputs.body.data._id)'
              headers:
                Content-Type: application/json
                Authorization: $steps.login.outputs.body.data
              body:
                path: $inputs.spider_file_path
                data: $inputs.spider_file_data
              within: 15s
          - id: run
            uses: api/call
            with:
              method: POST
              url: '$runtime.format("{}/{}/run", $inputs.spiders_url, $steps.create.outputs.body.data._id)'
              headers:
                Content-Type: application/json
                Authorization: $steps.login.outputs.body.data
              body:
                mode: random
                cmd: $inputs.spider_cmd
              within: 15s
            outputs:
              body: body
          - id: awaited
            uses: api/poll
            with:
              method: GET
              url: '$runtime.format("{}/{}", $inputs.tasks_url, $steps.run.outputs.body.data[0])'
              headers:
                Authorization: $steps.login.outputs.body.data
              within: 90s
              interval: 2s
              until:
                path: data.status
                equals: finished
            outputs:
              satisfied: satisfied
          - id: results
            uses: api/call
            with:
              method: GET
              url: '$runtime.format("{}/{}/results", $inputs.tasks_url, $steps.run.outputs.body.data[0])'
              headers:
                Authorization: $steps.login.outputs.body.data
              within: 15s
            outputs:
              status: status
              body: body
        assertions:
          - $steps.awaited.outputs.satisfied == true
          # Results endpoint is well-formed (200 with a data payload).
          - $steps.results.outputs.status == 200
          - $runtime.exists($steps.results.outputs.body.data)

  - id: AC-3
    description: |
      The logs and results endpoints reject an unknown task id: requesting
      logs or results for a non-existent task is refused with a client error,
      not served as an empty success. Without this, the positive checks could
      pass against a handler that answers 200 for anything.
    checks:
      - id: AC-3.1
        description: |
          Log in, then request logs and results for a non-existent task id;
          confirm both are refused with a 4xx client error.
        steps:
          - id: login
            uses: api/call
            with:
              method: POST
              url: $inputs.login_url
              headers: { Content-Type: application/json }
              body:
                username: $inputs.username
                password: $inputs.password
              within: 15s
            outputs:
              body: body
          - id: bad_logs
            uses: api/call
            with:
              method: GET
              url: '$runtime.format("{}/{}/logs", $inputs.tasks_url, $inputs.bad_task_id)'
              headers:
                Authorization: $steps.login.outputs.body.data
              within: 15s
            outputs:
              status: status
          - id: bad_results
            uses: api/call
            with:
              method: GET
              url: '$runtime.format("{}/{}/results", $inputs.tasks_url, $inputs.bad_task_id)'
              headers:
                Authorization: $steps.login.outputs.body.data
              within: 15s
            outputs:
              status: status
        assertions:
          - $steps.bad_logs.outputs.status >= 400
          - $steps.bad_logs.outputs.status < 500
          - $steps.bad_results.outputs.status >= 400
          - $steps.bad_results.outputs.status < 500
