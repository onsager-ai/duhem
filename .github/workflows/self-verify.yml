# Self-verify — Duhem-on-Duhem regression coverage (epic #148).
#
# Drives the REAL `duhem` binary through the in-tree self-verification
# Definitions and gates on the verdict. Two independent lanes:
#
#   - cli-regression: the `verifications/duhem-cli` VD (`cli/invoke`) —
#     the CLI contract (`--version` / `validate` / `init` / `run`).
#     Fully offline + page-free, so no Node / Playwright.
#   - dashboard-regression: the `verifications/duhem-dashboard` VD
#     (`api/call` + `ui/*`) — the served dashboard's JSON API, SPA
#     render, and SSE stream. Needs the SPA bundle embedded in the
#     binary AND a real Chromium for the `ui/*` browser checks.
#
# Black-box coverage that complements the white-box cargo tests in
# `crates/duhem-cli/tests/` and `crates/duhem-dashboard/tests/`.
#
# NOT the Onsager dogfood. This workflow is intentionally separate from
# `dogfood.yml`: per the Asymmetric-trust commitment
# (`docs/duhem-spec.md` §11.2), Duhem verifying Duhem is a regression
# safety net, not an independent trust anchor — the Onsager seam holds
# that role. See the caveat headers in the VDs' `duhem.yml`.
#
# A `changes` job scopes each lane to its own paths so a CLI-only PR
# never pays the dashboard lane's SPA-build + Chromium-install cost, and
# vice versa.

name: self-verify

on:
  pull_request:
    paths:
      - 'crates/duhem-cli/**'
      - 'crates/duhem-dashboard/**'
      - 'verifications/duhem-cli/**'
      - 'verifications/duhem-dashboard/**'
      - 'verifications/defaults-example/**'
      - '.github/workflows/self-verify.yml'
  push:
    branches: [main]
    paths:
      - 'crates/duhem-cli/**'
      - 'crates/duhem-dashboard/**'
      - 'verifications/duhem-cli/**'
      - 'verifications/duhem-dashboard/**'
      - 'verifications/defaults-example/**'
      - '.github/workflows/self-verify.yml'

concurrency:
  group: self-verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always

jobs:
  # Per-lane path scoping. Workflow-level `on.paths` only decides
  # whether the workflow runs at all; this filter decides which lane(s)
  # actually execute, so each lane stays a fast, targeted gate.
  changes:
    name: detect changes
    runs-on: ubuntu-latest
    outputs:
      cli: ${{ steps.filter.outputs.cli }}
      dashboard: ${{ steps.filter.outputs.dashboard }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            cli:
              - 'crates/duhem-cli/**'
              - 'verifications/duhem-cli/**'
              - 'verifications/defaults-example/**'
              - '.github/workflows/self-verify.yml'
            dashboard:
              - 'crates/duhem-dashboard/**'
              - 'verifications/duhem-dashboard/**'
              - '.github/workflows/self-verify.yml'

  cli-regression:
    name: cli regression
    needs: changes
    if: ${{ needs.changes.outputs.cli == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          rustup show active-toolchain
          cargo --version
          rustc --version

      - uses: Swatinem/rust-cache@v2

      - name: Build duhem CLI
        run: cargo build --release -p duhem-cli

      # The VD runs the binary under test, so point `duhem_bin` at the
      # freshly built artifact rather than whatever is on PATH. A
      # non-pass verdict exits non-zero and fails the job.
      - name: Run duhem-cli regression VD
        run: |
          ./target/release/duhem run verifications/duhem-cli \
            --db .duhem/duhem.db \
            --inputs duhem_bin="$PWD/target/release/duhem"

      # Hub replication (#194's ship contract; hub per
      # onsager-ai/duhem-hub#6). `if: always()` ships red runs too —
      # failure evidence is the point — and never gates the verdict.
      # Clean no-op when the secrets aren't configured.
      - name: Ship run bundle to hub (opt-in)
        if: always()
        continue-on-error: true
        env:
          DUHEM_HUB_URL: ${{ secrets.DUHEM_HUB_URL }}
          DUHEM_HUB_TOKEN: ${{ secrets.DUHEM_HUB_TOKEN }}
        run: |
          RUN_ID=$(python3 -c "import sqlite3; print(sqlite3.connect('.duhem/duhem.db').execute('SELECT run_id FROM runs ORDER BY started_at DESC LIMIT 1').fetchone()[0])" 2>/dev/null || true)
          if [ -n "$RUN_ID" ]; then
            ./target/release/duhem ship "$RUN_ID" --db .duhem/duhem.db --if-configured
          else
            echo "no run recorded; nothing to ship"
          fi

  dashboard-regression:
    name: dashboard regression
    needs: changes
    if: ${{ needs.changes.outputs.dashboard == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          rustup show active-toolchain
          cargo --version

      - uses: Swatinem/rust-cache@v2

      # Mirror the `duhem/run` composite action's driver setup: Node 20
      # LTS so the SPA build + the Playwright sidecar's pinned Chromium
      # revision both match the driver.
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # build.rs embeds web/dist at compile time, so the SPA MUST be
      # built before the dashboard binary — otherwise the binary serves
      # the placeholder index and AC-2's SPA-render assertions fail.
      - name: Build dashboard SPA bundle
        working-directory: crates/duhem-dashboard/web
        run: |
          npm ci
          npm run build

      - name: Build duhem + duhem-dashboard
        run: cargo build --release -p duhem-cli -p duhem-dashboard

      # AC-2 drives the real SPA in a real browser, so install Chromium
      # the same way the `ui-smoke` lane does — the sidecar's own pinned
      # Playwright, so the Chromium revision matches the driver.
      - name: Install Playwright sidecar deps + Chromium
        working-directory: crates/duhem-actions/sidecar
        run: |
          npm ci
          npx --yes playwright install --with-deps chromium

      # `scripts/up.sh` reads DUHEM_BIN to produce the fixture run and to
      # launch `duhem dashboard` (which resolves the sibling
      # `duhem-dashboard`). A non-pass verdict exits non-zero.
      - name: Run duhem-dashboard regression VD
        env:
          DUHEM_BIN: ${{ github.workspace }}/target/release/duhem
        run: |
          ./target/release/duhem run verifications/duhem-dashboard \
            --db .duhem/duhem.db

      # Hub replication — same contract as the duhem-cli job above.
      - name: Ship run bundle to hub (opt-in)
        if: always()
        continue-on-error: true
        env:
          DUHEM_HUB_URL: ${{ secrets.DUHEM_HUB_URL }}
          DUHEM_HUB_TOKEN: ${{ secrets.DUHEM_HUB_TOKEN }}
        run: |
          RUN_ID=$(python3 -c "import sqlite3; print(sqlite3.connect('.duhem/duhem.db').execute('SELECT run_id FROM runs ORDER BY started_at DESC LIMIT 1').fetchone()[0])" 2>/dev/null || true)
          if [ -n "$RUN_ID" ]; then
            ./target/release/duhem ship "$RUN_ID" --db .duhem/duhem.db --if-configured
          else
            echo "no run recorded; nothing to ship"
          fi
