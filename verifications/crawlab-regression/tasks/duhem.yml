# yaml-language-server: $schema=../../../schema/duhem.schema.json
# Crawlab regression suite leaf — task CRUD & execution (API-006)
#
# A faithful Duhem port of crawlab-team/crawlab-test's
# `specs/api/API-006-task-crud-execution.md`. A suite leaf (no own
# `environment:`): runs against the shared LICENSED Pro cluster the parent
# manifest (`../duhem.yml`) provisions — master + worker, so a task is
# really claimed over gRPC and executed. Standalone, run with `--no-env-up`
# against an already-up Pro cluster and pass the inherited inputs.
#
# This is the DEEPEST leaf: it drives a spider through the distributed task
# lifecycle and reads the persisted task state straight from Mongo. The
# execution path (AC-1) reuses the PROVEN recipe from the lifecycle VD
# (../../crawlab-spider-task-lifecycle) verbatim — create spider, save a
# `main.sh`, POST /spiders/{id}/run, `api/poll` /tasks/{id} until
# `finished`, then `db/query` the `tasks` collection.
#
# POSTURE — keep finding (Duhem #160/#167): assertions encode the CORRECT
# contract; a real defect surfaces RED.
#
# Provenance — confirmed vs INFERRED:
#   - CONFIRMED (lifecycle VD, all from crawlab-pro source): login envelope
#     + bare Authorization; spider `{_id,name,cmd,mode}` in Mongo `spiders`;
#     POST /spiders/{id}/files/save `{path,data}`; POST /spiders/{id}/run
#     `{mode,cmd}` -> `{data:[<taskId>,...]}`; GET /tasks/{id} ->
#     `{data:{status,...}}`; task `{_id,spider_id,status,cmd}` in Mongo
#     `tasks`; status enum pending/assigned/running/finished/error/
#     cancelled/abnormal; random mode enqueues a task a worker claims over
#     gRPC, syncs files, runs `cmd`.
#   - INFERRED (API-006 spec, confirm live): POST /api/tasks/run `{spider_id,
#     cmd,mode}` -> `{data:<taskId string>}` (API-006 §1 + "Task ID on
#     creation: {data: ObjectID string}"); GET /tasks -> `{data:[...],
#     total:N}` honouring `?page=&size=` (§6/§7); DELETE /tasks/{id} then
#     404 (§13). The auth leaf found a LIST controller (`/api/tokens`)
#     panics, so list behavior is per-controller — assert the spec and let
#     the live run show reality.
#   - The /tasks/run vs /spiders/{id}/run split is deliberate: AC-1 uses the
#     proven /spiders/{id}/run path so the deep green anchor does not hinge
#     on an inferred shape; AC-2 exercises the API-006-documented
#     /api/tasks/run endpoint and FLAGS its shape for the first live run.

verification: Crawlab — task CRUD & execution (API-006)
spec_ref: crawlab-team/crawlab-test specs/api/API-006-task-crud-execution.md

inputs:
  # AC-1 — execute to completion (proven recipe).
  name_exec:
    type: string
    default: duhem-task-exec-spider
  # AC-2 — /api/tasks/run create + link.
  name_run:
    type: string
    default: duhem-task-run-spider
  # AC-3 — list / pagination / get-by-id.
  name_list:
    type: string
    default: duhem-task-list-spider
  # AC-4 — delete.
  name_del:
    type: string
    default: duhem-task-del-spider
  # The spider runs a trivial, deterministic script the worker syncs and
  # executes, so the task drives to `finished`. `cmd` invokes the file.
  # The cmd string round-trips onto the task, so `db/query` can filter
  # `tasks` by it (a string field — no ObjectId-typed filter needed).
  spider_cmd:
    type: string
    default: bash main.sh
  spider_file_path:
    type: string
    default: main.sh
  spider_file_data:
    type: string
    default: "echo hello-from-duhem-task-regression\n"

inherits:
  - login_url
  - spiders_url
  - tasks_url
  - mongo_url
  - username
  - password

criteria:
  - id: AC-1
    description: |
      Running a spider executes a task to completion: the run is claimed by a
      worker, the spider's files are synced, the command runs, and the task
      drives to the terminal `finished` state — the full distributed
      lifecycle, with the terminal state and the spider→task link read from
      the real database, not inferred from the API.
    checks:
      - id: AC-1.1
        description: |
          Log in, create a spider, save a trivial script onto it, run it, poll
          /tasks/{id} until `finished`, then read the `tasks` collection in
          Mongo and confirm the persisted task reached `finished`, carries the
          spider's command, links to exactly the created spider, and is the
          task the run reported.
        steps:
          - id: login
            uses: api/call
            with:
              method: POST
              url: $inputs.login_url
              headers: { Content-Type: application/json }
              body:
                username: $inputs.username
                password: $inputs.password
              within: 15s
            outputs:
              body: body
          - id: create
            uses: api/call
            with:
              method: POST
              url: $inputs.spiders_url
              headers:
                Content-Type: application/json
                Authorization: $steps.login.outputs.body.data
              body:
                data:
                  name: $inputs.name_exec
                  cmd: $inputs.spider_cmd
                  mode: random
              within: 15s
            outputs:
              body: body
          - id: savefile
            uses: api/call
            with:
              method: POST
              url: '$runtime.format("{}/{}/files/save", $inputs.spiders_url, $steps.create.outputs.body.data._id)'
              headers:
                Content-Type: application/json
                Authorization: $steps.login.outputs.body.data
              body:
                path: $inputs.spider_file_path
                data: $inputs.spider_file_data
              within: 15s
            outputs:
              status: status
          - id: run
            uses: api/call
            with:
              method: POST
              url: '$runtime.format("{}/{}/run", $inputs.spiders_url, $steps.create.outputs.body.data._id)'
              headers:
                Content-Type: application/json
                Authorization: $steps.login.outputs.body.data
              body:
                mode: random
                cmd: $inputs.spider_cmd
              within: 15s
            outputs:
              status: status
              body: body
          - id: awaited
            uses: api/poll
            with:
              method: GET
              url: '$runtime.format("{}/{}", $inputs.tasks_url, $steps.run.outputs.body.data[0])'
              headers:
                Authorization: $steps.login.outputs.body.data
              within: 90s
              interval: 2s
              until:
                path: data.status
                equals: finished
            outputs:
              satisfied: satisfied
          - id: executed
            uses: db/query
            with:
              connection: $inputs.mongo_url
              find:
                collection: tasks
                filter:
                  cmd: $inputs.spider_cmd
                sort:
                  _id: -1
                limit: 1
              within: 15s
            outputs:
              rows: rows
              row_count: row_count
        assertions:
          - $steps.savefile.outputs.status == 200
          - $steps.run.outputs.status == 200
          # The worker drove the task to the terminal state within budget.
          - $steps.awaited.outputs.satisfied == true
          # The persisted task in Mongo reached `finished` with the command...
          - $steps.executed.outputs.row_count >= 1
          - $steps.executed.outputs.rows[0].status == "finished"
          - $steps.executed.outputs.rows[0].cmd == $inputs.spider_cmd
          # ...links to exactly the spider we created, and is the reported task.
          - $steps.executed.outputs.rows[0].spider_id == $steps.create.outputs.body.data._id
          - $steps.executed.outputs.rows[0]._id == $steps.run.outputs.body.data[0]

  - id: AC-2
    description: |
      The dedicated run endpoint creates a task bound to its spider: POST
      /api/tasks/run with a `spider_id` returns a task id, and fetching that
      task reports a real lifecycle status and links back to the spider. (The
      run-response shape is the API-006-documented `{data:<ObjectID string>}`
      — INFERRED for the Pro image; if it differs this check surfaces it.)
    checks:
      - id: AC-2.1
        description: |
          Create a runnable spider, POST /api/tasks/run with its `spider_id`,
          confirm a task id comes back, then GET the task and confirm it has a
          status and links to the spider.
        steps:
          - id: login
            uses: api/call
            with:
              method: POST
              url: $inputs.login_url
              headers: { Content-Type: application/json }
              body:
                username: $inputs.username
                password: $inputs.password
              within: 15s
            outputs:
              body: body
          - id: create
            uses: api/call
            with:
              method: POST
              url: $inputs.spiders_url
              headers:
                Content-Type: application/json
                Authorization: $steps.login.outputs.body.data
              body:
                data:
                  name: $inputs.name_run
                  cmd: $inputs.spider_cmd
                  mode: random
              within: 15s
            outputs:
              body: body
          - id: savefile
            uses: api/call
            with:
              method: POST
              url: '$runtime.format("{}/{}/files/save", $inputs.spiders_url, $steps.create.outputs.body.data._id)'
              headers:
                Content-Type: application/json
                Authorization: $steps.login.outputs.body.data
              body:
                path: $inputs.spider_file_path
                data: $inputs.spider_file_data
              within: 15s
          - id: run
            uses: api/call
            with:
              method: POST
              url: '$runtime.format("{}/run", $inputs.tasks_url)'
              headers:
                Content-Type: application/json
                Authorization: $steps.login.outputs.body.data
              body:
                spider_id: $steps.create.outputs.body.data._id
                mode: random
                cmd: $inputs.spider_cmd
              within: 15s
            outputs:
              status: status
              body: body
          - id: get_task
            uses: api/call
            with:
              method: GET
              url: '$runtime.format("{}/{}", $inputs.tasks_url, $steps.run.outputs.body.data[0])'
              headers:
                Authorization: $steps.login.outputs.body.data
              within: 15s
            outputs:
              status: status
              body: body
        assertions:
          - $steps.run.outputs.status == 200
          - $runtime.exists($steps.run.outputs.body.data)
          # The created task is fetchable, has a status, and links to the spider.
          - $steps.get_task.outputs.status == 200
          - $runtime.exists($steps.get_task.outputs.body.data.status)
          - $steps.get_task.outputs.body.data.spider_id == $steps.create.outputs.body.data._id

  - id: AC-3
    description: |
      Tasks are listable with pagination and fetchable by id: the list
      endpoint returns a non-empty array with a total count, a page-sized
      request returns no more than the page size, and GET by id returns the
      task. Read works for both the collection and single-resource shape.
    checks:
      - id: AC-3.1
        description: |
          Create a spider and start a task (so at least one task exists), list
          tasks (non-empty, total count), list with `?page=1&size=5` (at most
          5), and GET the started task by id.
        steps:
          - id: login
            uses: api/call
            with:
              method: POST
              url: $inputs.login_url
              headers: { Content-Type: application/json }
              body:
                username: $inputs.username
                password: $inputs.password
              within: 15s
            outputs:
              body: body
          - id: create
            uses: api/call
            with:
              method: POST
              url: $inputs.spiders_url
              headers:
                Content-Type: application/json
                Authorization: $steps.login.outputs.body.data
              body:
                data:
                  name: $inputs.name_list
                  cmd: $inputs.spider_cmd
                  mode: random
              within: 15s
            outputs:
              body: body
          - id: savefile
            uses: api/call
            with:
              method: POST
              url: '$runtime.format("{}/{}/files/save", $inputs.spiders_url, $steps.create.outputs.body.data._id)'
              headers:
                Content-Type: application/json
                Authorization: $steps.login.outputs.body.data
              body:
                path: $inputs.spider_file_path
                data: $inputs.spider_file_data
              within: 15s
          - id: run
            uses: api/call
            with:
              method: POST
              url: '$runtime.format("{}/{}/run", $inputs.spiders_url, $steps.create.outputs.body.data._id)'
              headers:
                Content-Type: application/json
                Authorization: $steps.login.outputs.body.data
              body:
                mode: random
                cmd: $inputs.spider_cmd
              within: 15s
            outputs:
              body: body
          - id: list
            uses: api/call
            with:
              method: GET
              url: '$runtime.format("{}?page=1&size=20", $inputs.tasks_url)'
              headers:
                Authorization: $steps.login.outputs.body.data
              within: 15s
            outputs:
              status: status
              body: body
          - id: list_paged
            uses: api/call
            with:
              method: GET
              url: '$runtime.format("{}?page=1&size=5", $inputs.tasks_url)'
              headers:
                Authorization: $steps.login.outputs.body.data
              within: 15s
            outputs:
              status: status
              body: body
          - id: get_one
            uses: api/call
            with:
              method: GET
              url: '$runtime.format("{}/{}", $inputs.tasks_url, $steps.run.outputs.body.data[0])'
              headers:
                Authorization: $steps.login.outputs.body.data
              within: 15s
            outputs:
              status: status
              body: body
        assertions:
          - $steps.list.outputs.status == 200
          - $runtime.len($steps.list.outputs.body.data) >= 1
          - $steps.list.outputs.body.total >= 1
          # Pagination caps the page at the requested size.
          - $steps.list_paged.outputs.status == 200
          - $runtime.len($steps.list_paged.outputs.body.data) <= 5
          # Fetch by id returns the started task.
          - $steps.get_one.outputs.status == 200
          - $steps.get_one.outputs.body.data._id == $steps.run.outputs.body.data[0]

  - id: AC-4
    description: |
      Tasks can be deleted: deleting a task by id succeeds and a subsequent
      fetch is refused with 404. The task is really removed, not flagged.
    checks:
      - id: AC-4.1
        description: |
          Create a spider, start a task, delete the task by id, then confirm a
          re-fetch returns 404.
        steps:
          - id: login
            uses: api/call
            with:
              method: POST
              url: $inputs.login_url
              headers: { Content-Type: application/json }
              body:
                username: $inputs.username
                password: $inputs.password
              within: 15s
            outputs:
              body: body
          - id: create
            uses: api/call
            with:
              method: POST
              url: $inputs.spiders_url
              headers:
                Content-Type: application/json
                Authorization: $steps.login.outputs.body.data
              body:
                data:
                  name: $inputs.name_del
                  cmd: $inputs.spider_cmd
                  mode: random
              within: 15s
            outputs:
              body: body
          - id: savefile
            uses: api/call
            with:
              method: POST
              url: '$runtime.format("{}/{}/files/save", $inputs.spiders_url, $steps.create.outputs.body.data._id)'
              headers:
                Content-Type: application/json
                Authorization: $steps.login.outputs.body.data
              body:
                path: $inputs.spider_file_path
                data: $inputs.spider_file_data
              within: 15s
          - id: run
            uses: api/call
            with:
              method: POST
              url: '$runtime.format("{}/{}/run", $inputs.spiders_url, $steps.create.outputs.body.data._id)'
              headers:
                Content-Type: application/json
                Authorization: $steps.login.outputs.body.data
              body:
                mode: random
                cmd: $inputs.spider_cmd
              within: 15s
            outputs:
              body: body
          # Wait for a terminal state before deleting, so the delete is
          # unambiguous (deleting a finished task, not racing the worker).
          - id: awaited
            uses: api/poll
            with:
              method: GET
              url: '$runtime.format("{}/{}", $inputs.tasks_url, $steps.run.outputs.body.data[0])'
              headers:
                Authorization: $steps.login.outputs.body.data
              within: 90s
              interval: 2s
              until:
                path: data.status
                equals: finished
            outputs:
              satisfied: satisfied
          - id: delete
            uses: api/call
            with:
              method: DELETE
              url: '$runtime.format("{}/{}", $inputs.tasks_url, $steps.run.outputs.body.data[0])'
              headers:
                Authorization: $steps.login.outputs.body.data
              within: 15s
            outputs:
              status: status
          - id: get_gone
            uses: api/call
            with:
              method: GET
              url: '$runtime.format("{}/{}", $inputs.tasks_url, $steps.run.outputs.body.data[0])'
              headers:
                Authorization: $steps.login.outputs.body.data
              within: 15s
            outputs:
              status: status
        assertions:
          - $steps.awaited.outputs.satisfied == true
          - $steps.delete.outputs.status == 200
          - $steps.get_gone.outputs.status == 404
