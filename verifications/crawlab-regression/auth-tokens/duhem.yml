# yaml-language-server: $schema=../../../schema/duhem.schema.json
# Crawlab regression suite leaf — authentication & token management (API-002)
#
# A faithful Duhem port of crawlab-team/crawlab-test's
# `specs/api/API-002-authentication-token-management.md`. A suite leaf (no
# own `environment:`): it runs against the shared LICENSED Pro cluster the
# parent manifest (`../duhem.yml`) provisions. Standalone, run it with
# `--no-env-up` against an already-up crawlab-pro and pass the inherited
# inputs with `--inputs`.
#
# Covers the spec's surface: POST /api/login, POST /api/logout,
# GET/POST /api/tokens, GET/DELETE /api/tokens/{id}, GET /api/users/me —
# all mechanical `api/call`, with a `db/query` on Mongo where it adds real
# DB-state depth (a created token persisted in the `tokens` collection).
#
# Provenance — what is confirmed vs inferred (cite the contract, not guesses):
#   - Endpoint paths + the `/api` prefix + admin/admin: confirmed from
#     crawlab-test API-002 (the maintainer's own test corpus, authoritative
#     for the REST contract) and docker-compose.test.yml's `/api/health`.
#   - Bare `Authorization: <token>` (no `Bearer`) + login returns the
#     session JWT under `{data:<token>}`: confirmed from the sibling
#     OSS-core VDs' source provenance (../../crawlab/auth, ../../crawlab/projects;
#     core/controllers/login.go, core/utils/token.go).
#   - Create wraps the model under `data` ({data:{name}}) and single-resource
#     reads return `{data:<model>}`: INFERRED from crawlab's generic
#     create/get controller (controllers/base.go), same envelope the
#     projects leaf uses. Confirm against crawlab-pro's token controller.
#   - /api/users/me returns the user under `data` with `username` + `_id`:
#     INFERRED from the same response envelope. Confirm against source.
#   - Logout invalidates the session token server-side (AC-3): asserted
#     from API-002 step 11. If crawlab-pro's logout is client-only (stateless
#     JWT), AC-3 fails in the product env and must be reframed — FLAG for
#     the maintainer to confirm before fan-out.

verification: Crawlab — authentication & token management (API-002)
spec_ref: crawlab-team/crawlab-test specs/api/API-002-authentication-token-management.md

# This leaf's OWN input: the token name it creates. The lifecycle check
# deletes the token at the end and the suite tears the cluster down with
# `down -v` (fresh Mongo each run), so a stable name is safe — Duhem
# resolves `with:` only for bare `$...` references, not `{{ }}` string
# interpolation (see duhem-runtime template.rs), so a templated unique
# name is not expressible here today. The cluster's endpoints +
# credentials + mongo URL are inherited from the parent manifest's
# `environments:` block (spec #135), declared once in `../duhem.yml`.
inputs:
  token_name:
    type: string
    default: duhem-regression-token

# Inherited from the parent manifest's `environments:` block. Run under the
# suite (`duhem run verifications/crawlab-regression`) so they bind;
# standalone, pass them with `--inputs login_url=... tokens_url=... ...`.
inherits:
  - login_url
  - logout_url
  - me_url
  - mongo_url
  - password
  - tokens_url
  - username

criteria:
  - id: AC-1
    description: |
      Logging in with valid credentials issues a usable session token, and
      that token authenticates the caller: an authenticated request for the
      current user is accepted and returns the same admin identity. Auth
      works end to end, not just at the login call.
    checks:
      - id: AC-1.1
        description: |
          Log in for a token, confirm it is a non-empty JWT, then read the
          current user with it. The session works end-to-end: login → 200
          with a JWT-shaped token, and an authenticated `/users/me` → 200
          identifying the admin user.
        steps:
          - id: login
            uses: api/call
            with:
              method: POST
              url: $inputs.login_url
              headers: { Content-Type: application/json }
              body:
                username: $inputs.username
                password: $inputs.password
              within: 15s
            outputs:
              status: status
              body: body
          - id: me
            uses: api/call
            with:
              method: GET
              url: $inputs.me_url
              headers:
                Authorization: $steps.login.outputs.body.data
              within: 15s
            outputs:
              status: status
              body: body
        assertions:
          - $steps.login.outputs.status == 200
          # A real token came back (a JWT is comfortably longer than 20)...
          - $runtime.len($steps.login.outputs.body.data) > 20
          # ...and it is JWT-shaped: three dot-separated base64url segments.
          - '$runtime.matches($steps.login.outputs.body.data, "^[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+$")'
          # The token authenticates a gated read identifying the admin user.
          - $steps.me.outputs.status == 200
          - $steps.me.outputs.body.data.username == $inputs.username
          - $runtime.exists($steps.me.outputs.body.data._id)

  - id: AC-2
    description: |
      API tokens have a real lifecycle backed by the database: a created
      token is returned by the API, persists as a document in Crawlab's
      Mongo `tokens` collection with the same identifier, is listed and
      fetchable by id, and once deleted it is gone — a subsequent fetch is
      refused. Token CRUD is verified at the database layer, not echoed by
      the handler.
    checks:
      - id: AC-2.1
        description: |
          One holistic slice of the token lifecycle: log in, create a token,
          read the `tokens` collection in Mongo to confirm it persisted with
          the API's `_id`, list tokens, fetch the token by id, delete it,
          then confirm a re-fetch is refused. Spans a REST write, a direct
          DB read, and the REST read/delete path.
        steps:
          - id: login
            uses: api/call
            with:
              method: POST
              url: $inputs.login_url
              headers: { Content-Type: application/json }
              body:
                username: $inputs.username
                password: $inputs.password
              within: 15s
            outputs:
              body: body
          - id: create
            uses: api/call
            with:
              method: POST
              url: $inputs.tokens_url
              headers:
                Content-Type: application/json
                Authorization: $steps.login.outputs.body.data
              body:
                data:
                  name: $inputs.token_name
              within: 15s
            outputs:
              status: status
              body: body
          - id: persisted
            uses: db/query
            with:
              connection: $inputs.mongo_url
              find:
                collection: tokens
                filter:
                  name: $inputs.token_name
                sort:
                  _id: -1
                limit: 1
              within: 15s
            outputs:
              rows: rows
              row_count: row_count
          - id: list
            uses: api/call
            with:
              method: GET
              url: $inputs.tokens_url
              headers:
                Authorization: $steps.login.outputs.body.data
              within: 15s
            outputs:
              status: status
              body: body
          - id: get_one
            uses: api/call
            with:
              method: GET
              url: '$runtime.format("{}/{}", $inputs.tokens_url, $steps.create.outputs.body.data._id)'
              headers:
                Authorization: $steps.login.outputs.body.data
              within: 15s
            outputs:
              status: status
              body: body
          - id: delete
            uses: api/call
            with:
              method: DELETE
              url: '$runtime.format("{}/{}", $inputs.tokens_url, $steps.create.outputs.body.data._id)'
              headers:
                Authorization: $steps.login.outputs.body.data
              within: 15s
            outputs:
              status: status
          - id: get_gone
            uses: api/call
            with:
              method: GET
              url: '$runtime.format("{}/{}", $inputs.tokens_url, $steps.create.outputs.body.data._id)'
              headers:
                Authorization: $steps.login.outputs.body.data
              within: 15s
            outputs:
              status: status
        assertions:
          # Create accepted and returned an id.
          - $steps.create.outputs.status == 200
          - $runtime.exists($steps.create.outputs.body.data._id)
          # The token actually persisted in Mongo with the API's id + name.
          - $steps.persisted.outputs.row_count >= 1
          - $steps.persisted.outputs.rows[0].name == $inputs.token_name
          - $steps.persisted.outputs.rows[0]._id == $steps.create.outputs.body.data._id
          # The list endpoint serves the tokens (non-empty).
          - $steps.list.outputs.status == 200
          - $runtime.len($steps.list.outputs.body.data) >= 1
          # Fetch by id returns the same token.
          - $steps.get_one.outputs.status == 200
          - $steps.get_one.outputs.body.data._id == $steps.create.outputs.body.data._id
          # Delete succeeds and the token is then gone.
          - $steps.delete.outputs.status == 200
          - $steps.get_gone.outputs.status == 404

  - id: AC-3
    description: |
      Logout is a client-side concern: Crawlab issues stateless JWTs, so the
      `/logout` endpoint is accepted but does NOT revoke the token server-side
      — invalidation is the client discarding it. This criterion pins that
      contract (logout 200, token still valid afterward); if Crawlab ever adds
      server-side revocation, this check changes deliberately.
    checks:
      - id: AC-3.1
        description: |
          Log in, confirm logout is accepted (200), then reuse the same token on
          a gated read and confirm it STILL authenticates (200) — stateless JWT,
          logout is client-side.
        steps:
          - id: login
            uses: api/call
            with:
              method: POST
              url: $inputs.login_url
              headers: { Content-Type: application/json }
              body:
                username: $inputs.username
                password: $inputs.password
              within: 15s
            outputs:
              body: body
          - id: logout
            uses: api/call
            with:
              method: POST
              url: $inputs.logout_url
              headers:
                Authorization: $steps.login.outputs.body.data
              within: 15s
            outputs:
              status: status
          - id: me_after
            uses: api/call
            with:
              method: GET
              url: $inputs.me_url
              headers:
                Authorization: $steps.login.outputs.body.data
              within: 15s
            outputs:
              status: status
        assertions:
          - $steps.logout.outputs.status == 200
          # Stateless JWT: the token still authenticates after logout —
          # invalidation is client-side (discard the token), not server-side.
          - $steps.me_after.outputs.status == 200

  - id: AC-4
    description: |
      The gated endpoint enforces authentication: a request carrying no
      valid session — neither a missing `Authorization` header nor a
      malformed token — is refused with 401. Without this, the positive
      checks could pass against an endpoint that never validates the token.
    checks:
      - id: AC-4.1
        description: |
          Request the gated endpoint with no `Authorization` header and
          confirm it is refused with 401 Unauthorized.
        steps:
          - id: no_auth
            uses: api/call
            with:
              method: GET
              url: $inputs.me_url
              within: 15s
            outputs:
              status: status
        assertions:
          - $steps.no_auth.outputs.status == 401
      - id: AC-4.2
        description: |
          Request the gated endpoint with a malformed token and confirm it
          is rejected with 401 — the gate validates the token, not just its
          presence.
        steps:
          - id: bad_token
            uses: api/call
            with:
              method: GET
              url: $inputs.me_url
              headers:
                Authorization: invalid.jwt.token
              within: 15s
            outputs:
              status: status
        assertions:
          - $steps.bad_token.outputs.status == 401

  - id: AC-5
    description: |
      Login refuses invalid credentials: a wrong password is rejected with
      a client error and issues no token. The credential check is real, not
      nominal.
    checks:
      - id: AC-5.1
        description: |
          Attempt to log in with a wrong password and confirm the request is
          refused with a 4xx status (no session issued).
        steps:
          - id: bad_login
            uses: api/call
            with:
              method: POST
              url: $inputs.login_url
              headers: { Content-Type: application/json }
              body:
                username: $inputs.username
                password: wrong-password-duhem-regression
              within: 15s
            outputs:
              status: status
        assertions:
          - $steps.bad_login.outputs.status >= 400
          - $steps.bad_login.outputs.status < 500
