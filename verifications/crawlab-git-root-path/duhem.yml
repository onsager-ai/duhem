# Crawlab — a git spider with git root path "~" syncs and runs to completion
#
# Regression VD for the client-reported bug (雷特 crawlab 对接群, 2026-06-29):
# a git-backed spider configured with a git root path of "~" failed in
# production — "线上环境扫不到我的文件" (the online environment can't scan my
# files) and the task "直接 crawlab 启动阶段就结束了，不执行任务脚本" (ends at
# startup, never runs the script), surfacing as
# "fork/exec /usr/bin/bash: no such file or directory".
#
# Root cause: "~" was joined verbatim into <workspace>/<gitId>/~ — a path
# that does not exist — so the master file scan failed
# ("lstat .../~: no such file or directory"), nothing synced to the worker,
# the worker working directory was never created, and the task command could
# not chdir into it (Go reports the failed child chdir under the exec path).
# Fix (crawlab-pro commit 4e0de456): utils.NormalizeGitRootPath maps "~" (and
# "~/", "/", ".", ".." …) to the repository root, applied at every git-root
# consumer (worker cwd, HTTP+gRPC sync, GetSpiderRootPath, master scan).
#
# What this VD proves holistically, against the real Pro cluster:
#   - `scripts/up.sh` seeds the master workspace like a freshly cloned repo:
#     the spider's files live at the repo ROOT (<workspace>/<gitId>/main.sh),
#     NOT under a "~/" sub-folder (seeding via Crawlab's files/save would move
#     the file WITH the bug and mask it — see up.sh header).
#   - the spider is configured exactly as the client's: git_id set,
#     git_root_path: "~".
#   - running it must drive the distributed task lifecycle to the terminal
#     `finished` state, read straight from Crawlab's MongoDB.
# Pre-fix this errors at sync (scan of <gitId>/~ misses the repo-root file);
# post-fix "~" resolves to the repo root, the file syncs, and the task
# finishes. (The fail-without-fix unit/integration guards live in
# crawlab-pro: TestGitRootPathTildeScanE2E, TestConfigureCwdNormalizes…,
# TestNormalizeGitRootPath.)
#
# Pro cluster (per docs/duhem-spec.md §8, no mocks): execution needs
# Crawlab's gRPC worker coordination, started only in the Pro layer. So
# up.sh runs the Pro binary as master + one worker over a real MongoDB.
#
# Shape provenance (all from crawlab-pro source, not guessed):
#   - POST /login -> {data:<token>}; Authorization: <token> (bare):
#     core/controllers/login.go, core/utils/token.go
#   - spider {_id,name,cmd,git_id,git_root_path,mode,...}; collection
#     `spiders`; git spiders sync from <workspace>/<git_id>/<git_root_path>:
#     core/models/models/spider.go, core/utils/spider.go,
#     core/task/handler/runner_sync_grpc.go, runner_config.go
#   - generic create wraps the model under `data` (controllers/base.go)
#   - POST /spiders/:id/run {mode,cmd} -> data:[<taskId>,...]:
#     core/controllers/spider.go PostSpiderRun
#   - GET /tasks/:id -> {data:{status,...}}; status enum includes
#     finished,error: core/controllers/task.go, core/constants/task.go
#   - task {_id,spider_id,status,cmd}; collection `tasks`:
#     core/models/models/task.go
#   - default admin/admin on first boot: core/user/service.go
#   - GET /health -> 200: core/controllers/health.go
#
# Ports: backend 8190, gRPC 9766; throwaway Mongo on host 27019, db `crawlab`
# (offset from the sibling lifecycle VD so this can run beside a local dev
# stack on the conventional 8090/9666/27018). Keep in sync with scripts/up.sh.

verification: Crawlab — a git spider with git root path "~" syncs and runs to completion

environment:
  up: ./scripts/up.sh
  down: ./scripts/down.sh
  ready:
    http:
      url: $inputs.health_url
      timeout: 180s

inputs:
  health_url:
    type: string
    default: http://127.0.0.1:8190/health
  login_url:
    type: string
    default: http://127.0.0.1:8190/login
  spiders_url:
    type: string
    default: http://127.0.0.1:8190/spiders
  tasks_url:
    type: string
    default: http://127.0.0.1:8190/tasks
  mongo_url:
    type: string
    default: mongodb://127.0.0.1:27019/crawlab
  username:
    type: string
    default: admin
  password:
    type: string
    default: admin
  spider_name:
    type: string
    default: duhem-git-root-path-spider
  # The fabricated git id whose workspace up.sh seeds at the repo root. This
  # MUST match DUHEM_CRAWLAB_GIT_ID / the default in scripts/up.sh.
  git_id:
    type: string
    default: 6a3b50c0483d52477bebb41a
  # The reproduction: the spider's code is at the repo root, but its root
  # path is "~". Pre-fix this points the sync at the non-existent
  # <workspace>/<gitId>/~ and the task errors.
  git_root_path:
    type: string
    default: "~"
  # Runs the repo-root script up.sh seeded.
  spider_cmd:
    type: string
    default: bash main.sh

criteria:
  - id: AC-1
    description: |
      A spider can be configured exactly as the client's: git-backed
      (git_id set) with a git root path of "~". The configuration persists
      to Crawlab's MongoDB verbatim — read straight from the `spiders`
      collection, not merely echoed by the API.
    checks:
      - id: AC-1.1
        description: |
          Log in, POST a git spider carrying git_id and git_root_path "~",
          then read the `spiders` collection and confirm the document is
          there with the "~" root path and the supplied git id (ObjectIDs
          surface as 24-hex strings via db/query's BSON→JSON mapping).
        steps:
          - id: login
            uses: api/call
            with:
              method: POST
              url: $inputs.login_url
              headers: { Content-Type: application/json }
              body:
                username: $inputs.username
                password: $inputs.password
              within: 15s
            outputs:
              body: body
          - id: create
            uses: api/call
            with:
              method: POST
              url: $inputs.spiders_url
              headers:
                Content-Type: application/json
                Authorization: $steps.login.outputs.body.data
              body:
                data:
                  name: $inputs.spider_name
                  cmd: $inputs.spider_cmd
                  mode: random
                  git_id: $inputs.git_id
                  git_root_path: $inputs.git_root_path
              within: 15s
            outputs:
              status: status
              body: body
          - id: persisted
            uses: db/query
            with:
              connection: $inputs.mongo_url
              find:
                collection: spiders
                filter:
                  name: $inputs.spider_name
                sort:
                  _id: -1
                limit: 1
              within: 15s
            outputs:
              rows: rows
              row_count: row_count
        assertions:
          - $steps.create.outputs.status == 200
          - $steps.persisted.outputs.row_count >= 1
          - $steps.persisted.outputs.rows[0].name == $inputs.spider_name
          # Configured exactly like the client's broken spider.
          - $steps.persisted.outputs.rows[0].git_root_path == $inputs.git_root_path
          - $steps.persisted.outputs.rows[0].git_id == $inputs.git_id
          - $steps.persisted.outputs.rows[0]._id == $steps.create.outputs.body.data._id

  - id: AC-2
    description: |
      Running the "~"-root git spider drives the full distributed task
      lifecycle to the terminal `finished` state: the worker claims the run
      over gRPC, syncs the repo-root files the clone left at
      <workspace>/<gitId>/, executes the command, and the task reaches
      `finished` — read from the real database, not inferred from the API.
      Pre-fix the sync failed on <gitId>/~ and the task reached `error`.
    checks:
      - id: AC-2.1
        description: |
          Log in, create the "~"-root git spider, run it, poll the task over
          REST until it reports `finished`, then read the `tasks` collection
          directly and confirm the persisted task really reached `finished`
          (and not `error`) carrying the spider's command and spider id.
        steps:
          - id: login
            uses: api/call
            with:
              method: POST
              url: $inputs.login_url
              headers: { Content-Type: application/json }
              body:
                username: $inputs.username
                password: $inputs.password
              within: 15s
            outputs:
              body: body
          - id: create
            uses: api/call
            with:
              method: POST
              url: $inputs.spiders_url
              headers:
                Content-Type: application/json
                Authorization: $steps.login.outputs.body.data
              body:
                data:
                  name: $inputs.spider_name
                  cmd: $inputs.spider_cmd
                  mode: random
                  git_id: $inputs.git_id
                  git_root_path: $inputs.git_root_path
              within: 15s
            outputs:
              body: body
          - id: run
            uses: api/call
            with:
              method: POST
              url: $runtime.format("{}/{}/run", $inputs.spiders_url, $steps.create.outputs.body.data._id)
              headers:
                Content-Type: application/json
                Authorization: $steps.login.outputs.body.data
              body:
                mode: random
                cmd: $inputs.spider_cmd
              within: 15s
            outputs:
              status: status
              body: body
          - id: awaited
            uses: api/poll
            with:
              method: GET
              url: $runtime.format("{}/{}", $inputs.tasks_url, $steps.run.outputs.body.data[0])
              headers:
                Authorization: $steps.login.outputs.body.data
              within: 120s
              interval: 2s
              until:
                path: data.status
                equals: finished
            outputs:
              satisfied: satisfied
          - id: executed
            uses: db/query
            with:
              connection: $inputs.mongo_url
              find:
                collection: tasks
                filter:
                  cmd: $inputs.spider_cmd
                sort:
                  _id: -1
                limit: 1
              within: 15s
            outputs:
              rows: rows
              row_count: row_count
        assertions:
          - $steps.run.outputs.status == 200
          # The worker drove the "~"-root spider to the terminal state.
          - $steps.awaited.outputs.satisfied == true
          # And the persisted task really finished — not errored at sync.
          - $steps.executed.outputs.row_count >= 1
          - $steps.executed.outputs.rows[0].status == "finished"
          - $steps.executed.outputs.rows[0].cmd == $inputs.spider_cmd
          - $steps.executed.outputs.rows[0].spider_id == $steps.create.outputs.body.data._id
