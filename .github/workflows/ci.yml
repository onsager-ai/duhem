name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  rust:
    name: rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # Full history (not the default shallow clone) so the
          # schema-changelog-check xtask can resolve the merge-base
          # against `origin/$GITHUB_BASE_REF` for any PR age. Small
          # repo — the extra fetch is cheap.
          fetch-depth: 0

      # rust-toolchain.toml pins the channel + components (rustfmt + clippy).
      - name: Show toolchain
        run: |
          rustup show active-toolchain
          cargo --version
          rustc --version

      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --workspace

      - name: file-budget lint
        run: cargo run -p xtask --quiet -- check-file-budget --mode=fail

      # Schema-versioning discipline (per the spec issue that introduced
      # `duhem_schema::SCHEMA_VERSION`). schema-drift: every fenced YAML
      # example under `docs/duhem-spec.md` §10 must parse + validate
      # against the current `SCHEMA_VERSION`. schema-changelog-check:
      # touching `crates/duhem-schema/src/**` or
      # `crates/duhem-evidence/src/**` requires an entry in
      # `CHANGELOG.md`'s `## Unreleased` section; `clarifying` PRs
      # bypass via `DUHEM_CHANGELOG_CLARIFYING=1`.
      - name: spec/code drift check
        run: cargo run -p xtask --quiet -- schema-drift

      # The generated action reference (docs/action-reference.md) is built
      # from the action contracts; a contract change that isn't regenerated
      # drifts the authoring reference away from what `duhem validate`
      # enforces. (#248)
      - name: action-reference drift check
        run: cargo run -p xtask --quiet -- action-reference --check

      # The user-facing authoring skill published under
      # templates/product-repo/.claude/skills/ is a sanitized sibling of
      # Duhem's internal dev skills; it must not leak internal dev context
      # (dogfood framing, seam/trust internals, dev-skill names). (#287)
      - name: skill-scrub (published skills ↔ no internal vocab)
        run: cargo run -p xtask --quiet -- skill-scrub

      # DX-currency gate (#288). readme-framing hard-fails; the currency
      # check is warn-only for now (flip to --mode=fail after a bake).
      # A PR that changes user-visible surface with no DX-doc update can
      # declare it deliberate with a `<!-- dx:none -->` marker in the body.
      - name: dx-drift (DX surfaces ↔ product currency)
        env:
          DUHEM_DX_IMPACT_NONE: ${{ contains(github.event.pull_request.body, '<!-- dx:none -->') && '1' || '' }}
        run: cargo run -p xtask --quiet -- dx-drift --mode=warn

      - name: changelog touch check
        if: github.event_name == 'pull_request'
        env:
          DUHEM_CHANGELOG_CLARIFYING: ${{ contains(github.event.pull_request.body, '<!-- schema:clarifying -->') && '1' || '' }}
        run: cargo run -p xtask --quiet -- schema-changelog-check

  # Browser-backed integration suites (`tests/ui_smoke.rs`,
  # `tests/api_observe_smoke.rs`) are `#[ignore]`d because they need a
  # real Chromium, so the `rust` job's `cargo test` skips them. Without
  # this lane, selector-engine / sidecar-protocol breakage rides through
  # CI green — exactly how the #75 `:has-text` regression shipped. Kept a
  # distinct job so the ~4-min Chromium install doesn't slow the fast
  # Rust gate and a browser flake reads as such. (spec #77)
  ui-smoke:
    name: ui-smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Show toolchain
        run: |
          rustup show active-toolchain
          cargo --version

      - uses: Swatinem/rust-cache@v2

      # Mirror the `duhem/run` composite action's driver setup: Node 20
      # LTS + the sidecar's own pinned Playwright, so the Chromium
      # revision always matches the driver.
      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24'

      - name: Install Playwright sidecar deps + Chromium
        working-directory: crates/duhem-actions/sidecar
        run: |
          npm ci
          npx --yes playwright install --with-deps chromium

      # Both ignored suites in one invocation; mirrors `just test-ui`.
      - name: cargo test (ignored browser suites)
        run: cargo test -p duhem-actions --test ui_smoke --test api_observe_smoke -- --ignored

  # Exercises `duhem run`'s auto-provision (#295): a `ui/*` run with no
  # usable sidecar must fetch Chromium itself instead of hard-failing (the
  # regression this lane guards). It runs against a node_modules-less
  # sidecar copy so the #105 discovery fallback can't satisfy the launch
  # from the runner's system Chrome. Distinct from `ui-smoke`, which
  # pre-installs the browser and so never takes the auto-provision path.
  browser-autoprovision-smoke:
    name: browser-autoprovision-smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Show toolchain
        run: rustup show active-toolchain

      - uses: Swatinem/rust-cache@v2

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24'

      # Chromium's OS libraries, so the browser the run auto-provisions can
      # actually launch. No browser binary and no sidecar node_modules — the
      # run below installs Chromium itself.
      - name: Install Chromium system libs
        run: npx --yes playwright@1.61.1 install-deps chromium

      - name: Write a browser-needing VD (known-good example.com baseline)
        run: |
          cat > "${RUNNER_TEMP}/autoprovision.duhem.yml" <<'YAML'
          verification: browser auto-provision smoke (#295)
          criteria:
            - id: AP
              description: A ui/* run auto-provisions Chromium when none is installed.
              checks:
                - id: AP.1
                  description: Load example.com and confirm its canonical heading is visible.
                  steps:
                    - uses: ui/navigate
                      with:
                        url: https://example.com
                    - uses: ui/assert-element
                      with:
                        locator: { role: heading, name: "Example Domain" }
                        expected: visible
                        within: 15s
          YAML

      # Force the auto-provision path deterministically. GitHub runners ship
      # /usr/bin/google-chrome, which the sidecar's discovery fallback (#105)
      # would use instead of installing anything. Point DUHEM_SIDECAR_DIR at a
      # copy with NO node_modules: that sidecar can't even import Playwright,
      # so launch fails regardless of any system browser and `duhem run` must
      # auto-provision. (Removing the ms-playwright cache is not enough — the
      # #105 discovery ladder also searches PATH.)
      - name: Run — expect auto-provision, then pass
        run: |
          set -o pipefail
          SC="${RUNNER_TEMP}/sidecar"; mkdir -p "$SC"
          cp crates/duhem-actions/sidecar/{index.mjs,package.json,package-lock.json,jsconfig.json} "$SC"/
          DUHEM_SIDECAR_DIR="$SC" cargo run -p duhem-cli --quiet -- run "${RUNNER_TEMP}/autoprovision.duhem.yml" 2> >(tee "${RUNNER_TEMP}/run.stderr" >&2)
          grep -q "Chromium not found — installing it once" "${RUNNER_TEMP}/run.stderr" \
            || { echo "::error::auto-provision notice not emitted — the run did not take the install path"; exit 1; }

      - name: Opt-out (DUHEM_NO_BROWSER_INSTALL=1) must fail fast with the hint
        run: |
          SC="${RUNNER_TEMP}/sidecar-optout"; mkdir -p "$SC"
          cp crates/duhem-actions/sidecar/{index.mjs,package.json,package-lock.json,jsconfig.json} "$SC"/
          set +e
          DUHEM_NO_BROWSER_INSTALL=1 DUHEM_SIDECAR_DIR="$SC" cargo run -p duhem-cli --quiet -- run "${RUNNER_TEMP}/autoprovision.duhem.yml" 2> "${RUNNER_TEMP}/optout.stderr"
          code=$?
          set -e
          cat "${RUNNER_TEMP}/optout.stderr"
          test "$code" -ne 0 || { echo "::error::opt-out still succeeded — auto-provision was not suppressed"; exit 1; }
          grep -q "duhem browser install" "${RUNNER_TEMP}/optout.stderr" \
            || { echo "::error::opt-out did not surface the actionable install hint"; exit 1; }
