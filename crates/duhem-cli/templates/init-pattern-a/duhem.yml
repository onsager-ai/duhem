# {{NAME}} — Duhem init skeleton
#
# Generated by `duhem init`. Edit this file to verify your real
# workload. The skeleton below runs end-to-end against
# https://example.com (a stable public page) so you have a known-
# good baseline to mutate; replace the criterion, the steps, and
# the assertions as you go.
#
# Criteria prose lives next door in `criteria.md` — keep that file
# in sync with intent (what "done" means) and let this file drift
# toward implementation (how we observe done). See
# `docs/duhem-spec.md` §7.2 / §7.3.

verification: {{NAME}} — Duhem init skeleton

inputs:
  base_url:
    type: string
    default: https://example.com

criteria:
  - id: AC-1
    description: |
      The example.com landing page renders its canonical heading.
      Replace this criterion with your own intent statement before
      flipping the spec issue to `planned`. Keep the language
      stable: a non-technical stakeholder should be able to
      decide yes/no without reading the YAML below.
    checks:
      - id: AC-1.1
        description: |
          Load the landing page and confirm the canonical heading
          is visible.
        steps:
          - uses: ui/navigate
            with:
              url: $inputs.base_url
          - id: heading
            uses: ui/assert-element
            with:
              locator: { role: heading, name: "Example Domain" }
              expected: visible
              within: 5s
            outputs:
              satisfied: satisfied
        assertions:
          - $steps.heading.outputs.satisfied == true
